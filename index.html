<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학급 수업 관리 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
  <style>
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
    .line-through { text-decoration: line-through; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // 반별 고정 색상 — 분홍/하늘/파랑/노랑/초록/주황
    const CLASS_COLOR_PALETTE = [
      { bg: "#fce7f3", text: "#9d174d", border: "#f472b6", dot: "#ec4899" }, // 분홍 → B반
      { bg: "#e0f2fe", text: "#0369a1", border: "#38bdf8", dot: "#0ea5e9" }, // 하늘 → D반
      { bg: "#dbeafe", text: "#1e40af", border: "#60a5fa", dot: "#3b82f6" }, // 파랑 → 7반
      { bg: "#fef9c3", text: "#854d0e", border: "#fbbf24", dot: "#f59e0b" }, // 노랑 → 8반
      { bg: "#dcfce7", text: "#166534", border: "#4ade80", dot: "#22c55e" }, // 초록 → 9반
      { bg: "#ffedd5", text: "#9a3412", border: "#fb923c", dot: "#f97316" }, // 주황 → 10반
    ];

    const cs = {
      badge:   (c) => ({ backgroundColor: c.bg, color: c.text, border: `1px solid ${c.border}` }),
      pill:    (c) => ({ backgroundColor: c.bg, color: c.text, border: `1px solid ${c.border}` }),
      pillOff: ()  => ({ backgroundColor: "#fff", color: "#9ca3af", border: "1px solid #e5e7eb" }),
      dot:     (c) => ({ backgroundColor: c.dot, width: 10, height: 10, borderRadius: "50%", display: "inline-block" }),
      bar:     (c, p) => ({ width: `${p}%`, backgroundColor: c.dot, height: 8, borderRadius: 9999 }),
      dayBtn:  (c, on) => on
        ? { backgroundColor: c.bg, color: c.text, border: `2px solid ${c.border}` }
        : { backgroundColor: "#f9fafb", color: "#9ca3af", border: "2px solid #e5e7eb" },
    };

    const DAY_NAMES      = ["일","월","화","수","목","금","토"];
    const DAY_NAMES_FULL = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
    const TOTAL_SESSIONS = 34;
    const today = new Date();

    const initClasses = () => [
      { id: 1, name: "B반",  days: [1,3,4], colorIndex: 0 },
      { id: 2, name: "D반",  days: [2,3,5], colorIndex: 1 },
      { id: 3, name: "7반",  days: [1,2,3], colorIndex: 2 },
      { id: 4, name: "8반",  days: [2,4,5], colorIndex: 3 },
      { id: 5, name: "9반",  days: [2,3,4], colorIndex: 4 },
      { id: 6, name: "10반", days: [1,4,5], colorIndex: 5 },
    ];

    const getColor = (cls) => CLASS_COLOR_PALETTE[cls.colorIndex % CLASS_COLOR_PALETTE.length];

    const parseDate = (str) => {
      if (!str) return null;
      const [y, m, d] = str.split("-").map(Number);
      return new Date(y, m - 1, d);
    };

    const isInRange = (year, month, day, sd, ed) => {
      const d = new Date(year, month, day);
      if (sd && d < sd) return false;
      if (ed && d > ed) return false;
      return true;
    };

    function App() {
      const [year,  setYear]  = useState(today.getFullYear());
      const [month, setMonth] = useState(today.getMonth());
      const [classes, setClasses]               = useState(initClasses);
      const [holidays, setHolidays]             = useState({});
      const [visibleClasses, setVisibleClasses] = useState([1,2,3,4,5,6]);
      const [activeTab, setActiveTab]           = useState("calendar");

      // 개별 차시 이름: key = "clsId-sessionNum"
      const [sessionNames, setSessionNames] = useState({});
      // 공통 차시 내용: key = sessionNum (숫자)
      const [commonNames, setCommonNames]   = useState({});

      // 모달
      const [editingSession, setEditingSession] = useState(null);
      const [sessionInput,   setSessionInput]   = useState("");
      const [commonInput,    setCommonInput]     = useState("");

      // 차시 관리 탭 인라인 편집
      const [editingCommonNum, setEditingCommonNum] = useState(null);
      const [commonEditInput,  setCommonEditInput]  = useState("");

      // 수업 기간
      const [periodStart, setPeriodStart] = useState(`${today.getFullYear()}-03-01`);
      const [periodEnd,   setPeriodEnd]   = useState(`${today.getFullYear()}-12-31`);
      const startDate = useMemo(() => parseDate(periodStart), [periodStart]);
      const endDate   = useMemo(() => parseDate(periodEnd),   [periodEnd]);

      // 시험기간: [{ id, label, start: "YYYY-MM-DD", end: "YYYY-MM-DD" }, ...]
      const [examPeriods, setExamPeriods] = useState([]);
      const [examForm, setExamForm] = useState({ label: "", start: "", end: "" });

      // 특정 날짜가 시험기간인지 확인
      const isExamDay = (y, m, d) => {
        const date = new Date(y, m, d);
        return examPeriods.some(ep => {
          const s = parseDate(ep.start);
          const e = parseDate(ep.end);
          return s && e && date >= s && date <= e;
        });
      };

      const addExamPeriod = () => {
        if (!examForm.start || !examForm.end) return;
        if (examForm.start > examForm.end) return;
        setExamPeriods(prev => [...prev, { id: Date.now(), label: examForm.label || "시험기간", start: examForm.start, end: examForm.end }]);
        setExamForm({ label: "", start: "", end: "" });
      };

      const removeExamPeriod = (id) => setExamPeriods(prev => prev.filter(ep => ep.id !== id));

      const calDays = useMemo(() => {
        const first = new Date(year, month, 1);
        const last  = new Date(year, month + 1, 0);
        const days  = [];
        for (let i = 0; i < first.getDay(); i++) days.push(null);
        for (let d = 1; d <= last.getDate(); d++) days.push(d);
        return days;
      }, [year, month]);

      const getPastSessions = (cls) => {
        let count = 0;
        for (let m = 0; m < month; m++) {
          const last = new Date(year, m + 1, 0);
          for (let d = 1; d <= last.getDate(); d++) {
            const date = new Date(year, m, d);
            const key  = `${year}-${m}-${d}`;
            if (cls.days.includes(date.getDay()) && !holidays[key] && isInRange(year, m, d, startDate, endDate) && !isExamDay(year, m, d)) count++;
          }
        }
        return count;
      };

      const getMonthSessions = (cls) => {
        const sessions = [];
        let sessionNum = getPastSessions(cls) + 1;
        calDays.forEach((d) => {
          if (!d) return;
          const date = new Date(year, month, d);
          const key  = `${year}-${month}-${d}`;
          if (cls.days.includes(date.getDay())) {
            const inRange = isInRange(year, month, d, startDate, endDate);
            const isExam  = isExamDay(year, month, d);
            if (!inRange) {
              sessions.push({ day: d, session: null, outOfRange: true });
            } else if (isExam) {
              sessions.push({ day: d, session: null, examDay: true });
            } else if (holidays[key]) {
              sessions.push({ day: d, session: sessionNum, cancelled: true });
            } else {
              sessions.push({ day: d, session: sessionNum, cancelled: false });
              sessionNum++;
            }
          }
        });
        return sessions;
      };

      const allSessionsMap = useMemo(() => {
        const map = {};
        classes.forEach(cls => { map[cls.id] = getMonthSessions(cls); });
        return map;
      }, [classes, holidays, examPeriods, year, month, startDate, endDate]);

      // 차시 표시 이름: 개별 > 공통 > 기본
      const getSessionLabel = (clsId, sessionNum) => {
        const ind = sessionNames[`${clsId}-${sessionNum}`];
        if (ind) return ind;
        const com = commonNames[sessionNum];
        if (com) return com;
        return `${sessionNum}차시`;
      };

      const toggleHoliday = (day) => {
        const key = `${year}-${month}-${day}`;
        setHolidays(h => ({ ...h, [key]: !h[key] }));
      };

      const toggleDay = (clsId, dow) => {
        setClasses(prev => prev.map(c => {
          if (c.id !== clsId) return c;
          const days = c.days.includes(dow) ? c.days.filter(d => d !== dow) : [...c.days, dow].sort();
          return { ...c, days };
        }));
      };

      const toggleVisible = (id) =>
        setVisibleClasses(v => v.includes(id) ? v.filter(x => x !== id) : [...v, id]);

      const prevMonth = () => { if (month === 0) { setMonth(11); setYear(y => y-1); } else setMonth(m => m-1); };
      const nextMonth = () => { if (month === 11) { setMonth(0);  setYear(y => y+1); } else setMonth(m => m+1); };

      const isToday   = (d) => d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
      const isHoliday = (d) => holidays[`${year}-${month}-${d}`];
      const isOut     = (d) => d && !isInRange(year, month, d, startDate, endDate);
      const isExamInView = (d) => d && isExamDay(year, month, d);

      // 현재 달에 겹치는 시험기간 + 라벨 가져오기
      const getExamLabel = (d) => {
        const date = new Date(year, month, d);
        const ep = examPeriods.find(ep => {
          const s = parseDate(ep.start); const e = parseDate(ep.end);
          return s && e && date >= s && date <= e;
        });
        return ep ? ep.label : "";
      };

      const getDayClasses = (day) => {
        if (!day) return [];
        const dow = new Date(year, month, day).getDay();
        return classes.filter(cls => cls.days.includes(dow) && visibleClasses.includes(cls.id));
      };

      const openModal = (clsId, sessionNum) => {
        setEditingSession({ clsId, sessionNum });
        setSessionInput(sessionNames[`${clsId}-${sessionNum}`] || "");
        setCommonInput(commonNames[sessionNum] || "");
      };

      const saveModal = () => {
        if (!editingSession) return;
        const { clsId, sessionNum } = editingSession;
        setSessionNames(s => ({ ...s, [`${clsId}-${sessionNum}`]: sessionInput.trim() }));
        setCommonNames(s => ({ ...s, [sessionNum]: commonInput.trim() }));
        setEditingSession(null);
      };

      const allSessionNums = useMemo(() => {
        const nums = new Set();
        for (let i = 1; i <= TOTAL_SESSIONS; i++) nums.add(i);
        return [...nums].sort((a,b) => a-b);
      }, []);

      return (
        <div className="min-h-screen bg-gray-50">
          {/* Header */}
          <div className="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm">
            <div className="flex items-center gap-2">
              <span className="text-xl">📚</span>
              <h1 className="text-lg font-bold text-gray-800">학급 수업 관리 대시보드</h1>
            </div>
            <div className="flex gap-1">
              {["calendar","stats","curriculum","settings"].map(tab => (
                <button key={tab} onClick={() => setActiveTab(tab)}
                  className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors
                    ${activeTab === tab ? "bg-blue-600 text-white" : "text-gray-600 hover:bg-gray-100"}`}>
                  {tab==="calendar"?"📅 달력":tab==="stats"?"📊 통계":tab==="curriculum"?"📝 차시 관리":"⚙️ 설정"}
                </button>
              ))}
            </div>
          </div>

          <div className="max-w-5xl mx-auto px-3 py-4">
            {/* 반 필터 pills */}
            <div className="flex flex-wrap gap-2 mb-4">
              <button onClick={() => setVisibleClasses(classes.map(c=>c.id))}
                className="px-3 py-1 rounded-full text-xs font-medium bg-gray-200 text-gray-700 hover:bg-gray-300">전체</button>
              {classes.map((cls) => {
                const col    = getColor(cls);
                const active = visibleClasses.includes(cls.id);
                return (
                  <button key={cls.id} onClick={() => toggleVisible(cls.id)}
                    style={active ? cs.pill(col) : cs.pillOff()}
                    className="px-3 py-1 rounded-full text-xs font-semibold transition-all">
                    {cls.name}
                  </button>
                );
              })}
            </div>

            {/* ─── 달력 탭 ─── */}
            {activeTab === "calendar" && (
              <>
                {(periodStart || periodEnd) && (
                  <div className="mb-3 px-3 py-2 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-700 flex items-center gap-2 flex-wrap">
                    <span>📌 수업 기간:</span>
                    <span className="font-semibold">{periodStart||"시작일 미설정"} ~ {periodEnd||"종료일 미설정"}</span>
                    <span className="text-blue-400">· 기간 외 날짜는 차시 계산에서 제외됩니다</span>
                  </div>
                )}
                <div className="flex items-center justify-between mb-4 bg-white rounded-xl p-3 shadow-sm border border-gray-100">
                  <button onClick={prevMonth} className="p-1.5 rounded-lg hover:bg-gray-100 text-gray-600">◀</button>
                  <h2 className="font-bold text-gray-800">{year}년 {month+1}월</h2>
                  <button onClick={nextMonth} className="p-1.5 rounded-lg hover:bg-gray-100 text-gray-600">▶</button>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                  <div className="grid grid-cols-7 border-b border-gray-100">
                    {DAY_NAMES.map((d,i) => (
                      <div key={d} className={`py-2 text-center text-xs font-semibold
                        ${i===0?"text-red-400":i===6?"text-blue-400":"text-gray-500"}`}>{d}</div>
                    ))}
                  </div>
                  <div className="grid grid-cols-7">
                    {calDays.map((day, idx) => {
                      const dow      = idx % 7;
                      const dayClses = day ? getDayClasses(day) : [];
                      const holiday  = day && isHoliday(day);
                      const todayMk  = day && isToday(day);
                      const outRange = isOut(day);
                      const examDay  = isExamInView(day);
                      const examLbl  = examDay ? getExamLabel(day) : "";
                      return (
                        <div key={idx}
                          style={
                            outRange&&day ? {backgroundColor:"#f3f4f6",opacity:0.65} :
                            examDay       ? {backgroundColor:"#f5f3ff"} :
                            holiday       ? {backgroundColor:"#fef2f2"} : {}
                          }
                          className={`min-h-20 border-r border-b border-gray-50 p-1.5 ${!day?"bg-gray-50":""}`}>
                          {day && (
                            <>
                              <div className="flex items-center justify-between mb-1">
                                <span onClick={() => !outRange && !examDay && toggleHoliday(day)}
                                  className={`text-xs font-semibold w-6 h-6 flex items-center justify-center rounded-full select-none
                                    ${outRange||examDay?"text-gray-400 cursor-default":"cursor-pointer hover:ring-2 hover:ring-yellow-300"}
                                    ${todayMk?"bg-blue-600 text-white":holiday?"text-red-500":dow===0?"text-red-400":dow===6?"text-blue-400":"text-gray-700"}`}>
                                  {day}
                                </span>
                                {holiday && <span className="text-xs text-red-400 font-medium">휴</span>}
                                {examDay && !holiday && (
                                  <span style={{backgroundColor:"#7c3aed",color:"#fff",fontSize:"10px",padding:"1px 5px",borderRadius:"9999px",fontWeight:700,whiteSpace:"nowrap"}}>
                                    ✏️ {examLbl}
                                  </span>
                                )}
                              </div>
                              {!examDay && (
                                <div className="flex flex-col gap-0.5">
                                  {dayClses.map(cls => {
                                    const col      = getColor(cls);
                                    const sessions = allSessionsMap[cls.id] || [];
                                    const sess     = sessions.find(s => s.day === day);
                                    if (!sess) return null;
                                    if (sess.outOfRange) return (
                                      <div key={cls.id} style={{...cs.badge(col),opacity:0.3}}
                                        className="text-xs px-1 py-0.5 rounded font-medium truncate">
                                        <span className="font-bold">{cls.name}</span>
                                      </div>
                                    );
                                    const label = getSessionLabel(cls.id, sess.session);
                                    return (
                                      <div key={cls.id}
                                        onClick={() => !sess.cancelled && openModal(cls.id, sess.session)}
                                        style={{...cs.badge(col),opacity:sess.cancelled?0.4:1}}
                                        className={`text-xs px-1 py-0.5 rounded font-medium truncate cursor-pointer ${sess.cancelled?"line-through":""}`}
                                        title={sess.cancelled?"휴강":label}>
                                        <span className="font-bold">{cls.name}</span> {!sess.cancelled && label}
                                      </div>
                                    );
                                  })}
                                </div>
                              )}
                            </>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
                <p className="text-xs text-gray-400 mt-2 text-center">날짜 클릭 → 휴업일 지정 | 수업 클릭 → 수업 내용 입력 | 시험기간은 ⚙️ 설정에서 관리</p>
              </>
            )}

            {/* ─── 통계 탭 ─── */}
            {activeTab === "stats" && (
              <div className="space-y-4">
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                  <h3 className="font-bold text-gray-700 mb-3 text-sm">{year}년 {month+1}월 수업 횟수 요약</h3>
                  <div className="space-y-3">
                    {classes.filter(c => visibleClasses.includes(c.id)).map((cls) => {
                      const col      = getColor(cls);
                      const sessions = allSessionsMap[cls.id] || [];
                      const actual   = sessions.filter(s => !s.cancelled && !s.outOfRange).length;
                      const cancelled = sessions.filter(s => s.cancelled).length;
                      const past     = getPastSessions(cls);
                      const cumul    = past + actual;
                      const pct      = Math.min((cumul / TOTAL_SESSIONS) * 100, 100);
                      return (
                        <div key={cls.id} className="space-y-1">
                          <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2">
                              <span style={cs.dot(col)}></span>
                              <span className="text-sm font-semibold text-gray-700">{cls.name}</span>
                              <span className="text-xs text-gray-400">({cls.days.map(d=>DAY_NAMES[d]).join("/")})</span>
                            </div>
                            <div>
                              <span className="text-sm font-bold text-gray-800">{actual}회</span>
                              {cancelled > 0 && <span className="text-xs text-red-400 ml-1">(휴강 {cancelled})</span>}
                            </div>
                          </div>
                          <div className="flex items-center gap-2">
                            <div className="flex-1 bg-gray-100 rounded-full h-2">
                              <div style={cs.bar(col, pct)}></div>
                            </div>
                            <span className="text-xs text-gray-500 w-16 text-right">누적 {cumul}/{TOTAL_SESSIONS}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                  <h3 className="font-bold text-gray-700 mb-3 text-sm">반별 비교</h3>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                      <thead>
                        <tr className="text-xs text-gray-500 border-b border-gray-100">
                          <th className="text-left py-2">반</th>
                          <th className="text-center py-2">수업 요일</th>
                          <th className="text-center py-2">이번달</th>
                          <th className="text-center py-2">누적</th>
                          <th className="text-center py-2">진도율</th>
                        </tr>
                      </thead>
                      <tbody>
                        {classes.filter(c => visibleClasses.includes(c.id)).map((cls) => {
                          const col      = getColor(cls);
                          const sessions = allSessionsMap[cls.id] || [];
                          const actual   = sessions.filter(s => !s.cancelled && !s.outOfRange).length;
                          const past     = getPastSessions(cls);
                          const cumul    = past + actual;
                          const pct      = Math.min(Math.round((cumul / TOTAL_SESSIONS) * 100), 100);
                          return (
                            <tr key={cls.id} className="border-b border-gray-50">
                              <td className="py-2">
                                <span style={cs.badge(col)} className="px-2 py-0.5 rounded text-xs font-semibold">{cls.name}</span>
                              </td>
                              <td className="text-center text-xs text-gray-600">{cls.days.map(d=>DAY_NAMES[d]).join(", ")}</td>
                              <td className="text-center font-semibold text-gray-800">{actual}회</td>
                              <td className="text-center text-gray-700">{cumul}차시</td>
                              <td className="text-center">
                                <span style={{color:pct>=80?"#059669":pct>=50?"#d97706":"#dc2626"}}
                                  className="text-xs font-bold">{pct}%</span>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* ─── 차시 관리 탭 ─── */}
            {activeTab === "curriculum" && (
              <div className="space-y-3">
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                  <h3 className="font-bold text-gray-700 mb-1 text-sm">📝 차시별 공통 수업 내용</h3>
                  <p className="text-xs text-gray-400 mb-4">
                    차시에 내용을 입력하면 <strong className="text-gray-600">모든 반의 해당 차시</strong>에 동일하게 표시됩니다.<br/>
                    달력에서 수업을 클릭해 <strong className="text-gray-600">반별 개별 내용</strong>을 입력하면 공통 내용 대신 표시됩니다.
                  </p>
                  <div className="space-y-1.5">
                    {allSessionNums.map(num => {
                      const isEditing = editingCommonNum === num;
                      const val = commonNames[num] || "";
                      return (
                        <div key={num} className="flex items-center gap-2 group">
                          <span className="text-xs font-bold text-gray-400 w-12 shrink-0 text-right">{num}차시</span>
                          {isEditing ? (
                            <>
                              <input autoFocus value={commonEditInput}
                                onChange={e => setCommonEditInput(e.target.value)}
                                onKeyDown={e => {
                                  if (e.key==="Enter") { setCommonNames(s=>({...s,[num]:commonEditInput.trim()})); setEditingCommonNum(null); }
                                  if (e.key==="Escape") setEditingCommonNum(null);
                                }}
                                placeholder="수업 내용 입력..."
                                className="flex-1 border border-blue-300 rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-blue-200" />
                              <button onClick={() => { setCommonNames(s=>({...s,[num]:commonEditInput.trim()})); setEditingCommonNum(null); }}
                                className="text-xs px-2 py-1 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium shrink-0">저장</button>
                              <button onClick={() => setEditingCommonNum(null)}
                                className="text-xs px-2 py-1 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 font-medium shrink-0">취소</button>
                            </>
                          ) : (
                            <>
                              <span onClick={() => { setEditingCommonNum(num); setCommonEditInput(val); }}
                                className={`flex-1 text-xs px-2 py-1.5 rounded-lg cursor-pointer border transition-colors
                                  ${val ? "text-gray-700 bg-gray-50 border-gray-200 hover:border-blue-300 hover:bg-blue-50"
                                        : "text-gray-300 bg-white border-dashed border-gray-200 hover:border-blue-300 hover:text-gray-400"}`}>
                                {val || "클릭하여 입력..."}
                              </span>
                              {val && (
                                <button onClick={() => setCommonNames(s=>{const n={...s};delete n[num];return n;})}
                                  className="text-xs text-gray-300 hover:text-red-400 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity px-1">✕</button>
                              )}
                            </>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>

                {Object.keys(sessionNames).filter(k=>sessionNames[k]).length > 0 && (
                  <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                    <h3 className="font-bold text-gray-700 mb-3 text-sm">반별 개별 수업 내용</h3>
                    <div className="space-y-1.5">
                      {Object.entries(sessionNames).filter(([,v])=>v).sort(([a],[b])=>{
                        const [aId,aN]=a.split("-").map(Number);
                        const [bId,bN]=b.split("-").map(Number);
                        return aN!==bN?aN-bN:aId-bId;
                      }).map(([key, val]) => {
                        const [clsId, sesNum] = key.split("-").map(Number);
                        const cls = classes.find(c => c.id === clsId);
                        if (!cls) return null;
                        const col = getColor(cls);
                        return (
                          <div key={key} className="flex items-center gap-2 text-xs group">
                            <span className="text-gray-400 w-12 text-right shrink-0">{sesNum}차시</span>
                            <span style={cs.badge(col)} className="px-1.5 py-0.5 rounded font-bold shrink-0">{cls.name}</span>
                            <span className="text-gray-700 flex-1">{val}</span>
                            <button onClick={() => setSessionNames(s=>{const n={...s};delete n[key];return n;})}
                              className="text-gray-300 hover:text-red-400 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ─── 설정 탭 ─── */}
            {activeTab === "settings" && (
              <div className="space-y-3">

                {/* 시험기간 설정 */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                  <h3 className="font-bold text-gray-700 mb-1 text-sm">✏️ 시험기간 설정</h3>
                  <p className="text-xs text-gray-400 mb-3">시험기간으로 지정된 날은 수업이 없으며 차시 계산에서 제외됩니다.</p>
                  {/* 추가 폼 */}
                  <div className="flex flex-wrap gap-2 items-end mb-3">
                    <div className="flex flex-col gap-1">
                      <label className="text-xs text-gray-500 font-medium">이름 (선택)</label>
                      <input type="text" value={examForm.label} onChange={e=>setExamForm(f=>({...f,label:e.target.value}))}
                        placeholder="예: 1차 지필평가"
                        className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300 w-36"/>
                    </div>
                    <div className="flex flex-col gap-1">
                      <label className="text-xs text-gray-500 font-medium">시작일</label>
                      <input type="date" value={examForm.start} onChange={e=>setExamForm(f=>({...f,start:e.target.value}))}
                        className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300"/>
                    </div>
                    <div className="flex flex-col gap-1">
                      <label className="text-xs text-gray-500 font-medium">종료일</label>
                      <input type="date" value={examForm.end} onChange={e=>setExamForm(f=>({...f,end:e.target.value}))}
                        className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300"/>
                    </div>
                    <button onClick={addExamPeriod}
                      style={{backgroundColor:"#7c3aed",color:"#fff"}}
                      className="px-4 py-2 rounded-lg text-sm font-semibold hover:opacity-90 transition-opacity">
                      + 추가
                    </button>
                  </div>
                  {examForm.start && examForm.end && examForm.start > examForm.end &&
                    <p className="text-xs text-red-500 mb-2">⚠️ 시작일이 종료일보다 늦습니다.</p>}
                  {/* 등록된 시험기간 목록 */}
                  {examPeriods.length === 0 ? (
                    <p className="text-xs text-gray-400">등록된 시험기간 없음</p>
                  ) : (
                    <div className="space-y-2">
                      {examPeriods.map(ep => (
                        <div key={ep.id} className="flex items-center gap-2 bg-purple-50 border border-purple-200 rounded-lg px-3 py-2">
                          <span style={{backgroundColor:"#7c3aed",color:"#fff",fontSize:"10px",padding:"2px 7px",borderRadius:"9999px",fontWeight:700}}>
                            ✏️ {ep.label}
                          </span>
                          <span className="text-xs text-purple-700 font-medium">{ep.start} ~ {ep.end}</span>
                          <button onClick={() => removeExamPeriod(ep.id)}
                            className="ml-auto text-purple-300 hover:text-red-400 text-sm font-bold">✕</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                  <h3 className="font-bold text-gray-700 mb-1 text-sm">📅 수업 기간 설정</h3>
                  <p className="text-xs text-gray-400 mb-3">설정한 기간 안의 날짜만 차시 계산에 포함됩니다.</p>
                  <div className="flex flex-wrap gap-4 items-end">
                    <div className="flex flex-col gap-1">
                      <label className="text-xs text-gray-500 font-medium">시작일</label>
                      <input type="date" value={periodStart} onChange={e=>setPeriodStart(e.target.value)}
                        className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
                    </div>
                    <div className="flex flex-col gap-1">
                      <label className="text-xs text-gray-500 font-medium">종료일</label>
                      <input type="date" value={periodEnd} onChange={e=>setPeriodEnd(e.target.value)}
                        className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
                    </div>
                    <button onClick={() => { setPeriodStart(""); setPeriodEnd(""); }}
                      className="px-3 py-2 text-xs bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 font-medium">
                      기간 제한 없음
                    </button>
                  </div>
                  {periodStart && periodEnd && periodStart > periodEnd &&
                    <p className="text-xs text-red-500 mt-2">⚠️ 시작일이 종료일보다 늦습니다.</p>}
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                  <h3 className="font-bold text-gray-700 mb-3 text-sm">학급별 수업 요일 설정</h3>
                  <div className="space-y-4">
                    {classes.map((cls) => {
                      const col = getColor(cls);
                      return (
                        <div key={cls.id} className="flex items-center gap-3 flex-wrap">
                          <span style={cs.badge(col)} className="px-2.5 py-1 rounded-lg text-sm font-bold w-14 text-center">{cls.name}</span>
                          <div className="flex gap-1.5">
                            {[1,2,3,4,5].map(dow => (
                              <button key={dow} onClick={() => toggleDay(cls.id, dow)}
                                style={cs.dayBtn(col, cls.days.includes(dow))}
                                className="w-9 h-9 rounded-lg text-sm font-semibold transition-all">
                                {DAY_NAMES[dow]}
                              </button>
                            ))}
                          </div>
                          <span className="text-xs text-gray-400">{cls.days.map(d=>DAY_NAMES_FULL[d]).join(", ")}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                  <h3 className="font-bold text-gray-700 mb-2 text-sm">이번달 휴업일</h3>
                  <div className="flex flex-wrap gap-2">
                    {Object.entries(holidays).filter(([k,v])=>v&&k.startsWith(`${year}-${month}-`)).map(([k])=>{
                      const day = parseInt(k.split("-")[2]);
                      return (
                        <span key={k} className="flex items-center gap-1 bg-red-50 text-red-600 text-xs px-2 py-1 rounded-lg border border-red-200">
                          {month+1}월 {day}일
                          <button onClick={() => toggleHoliday(day)} className="hover:text-red-800 ml-1">✕</button>
                        </span>
                      );
                    })}
                    {!Object.entries(holidays).some(([k,v])=>v&&k.startsWith(`${year}-${month}-`)) &&
                      <span className="text-xs text-gray-400">지정된 휴업일 없음 (달력에서 날짜 클릭으로 지정)</span>}
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* ─── 수업 내용 입력 모달 ─── */}
          {editingSession && (() => {
            const cls = classes.find(c => c.id === editingSession.clsId);
            const col = cls ? getColor(cls) : null;
            const { sessionNum } = editingSession;
            return (
              <div className="fixed inset-0 flex items-center justify-center z-50 px-4" style={{background:"rgba(0,0,0,0.35)"}}>
                <div className="bg-white rounded-2xl shadow-xl p-5 w-full max-w-sm">
                  <div className="flex items-center gap-2 mb-4">
                    {col && <span style={cs.badge(col)} className="px-2 py-0.5 rounded font-bold text-sm">{cls.name}</span>}
                    <span className="font-bold text-gray-800 text-sm">{sessionNum}차시 수업 내용</span>
                  </div>

                  <div className="mb-3">
                    <label className="text-xs font-semibold text-gray-500 mb-1 block">
                      📌 공통 내용
                      <span className="font-normal text-gray-400 ml-1">— 모든 반 {sessionNum}차시에 적용</span>
                    </label>
                    <input value={commonInput} onChange={e=>setCommonInput(e.target.value)}
                      placeholder="예: 3단원 — 세포의 구조와 기능"
                      className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200"/>
                  </div>

                  <div className="mb-4">
                    <label className="text-xs font-semibold text-gray-500 mb-1 block">
                      ✏️ {cls?.name} 개별 내용
                      <span className="font-normal text-gray-400 ml-1">— 이 반만 적용, 공통 내용 대신 표시</span>
                    </label>
                    <input autoFocus value={sessionInput} onChange={e=>setSessionInput(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&saveModal()}
                      placeholder="비워두면 공통 내용이 표시됩니다"
                      className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"/>
                  </div>

                  <div className="flex gap-2">
                    <button onClick={saveModal}
                      className="flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-blue-700">저장</button>
                    <button onClick={() => setEditingSession(null)}
                      className="flex-1 bg-gray-100 text-gray-600 rounded-lg py-2 text-sm font-semibold hover:bg-gray-200">취소</button>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
