<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 학급 수업 관리 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
  <style>
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
    .line-through { text-decoration: line-through; opacity: 0.5; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // 반별 색상 테마 정의
    const CLASS_THEMES = {
      1: { bg: "bg-blue-100", text: "text-blue-800", border: "border-blue-300", dot: "bg-blue-500" },
      2: { bg: "bg-emerald-100", text: "text-emerald-800", border: "border-emerald-300", dot: "bg-emerald-500" },
      3: { bg: "bg-violet-100", text: "text-violet-800", border: "border-violet-300", dot: "bg-violet-500" },
      4: { bg: "bg-orange-100", text: "text-orange-800", border: "border-orange-300", dot: "bg-orange-500" },
      5: { bg: "bg-pink-100", text: "text-pink-800", border: "border-pink-300", dot: "bg-pink-500" },
      6: { bg: "bg-teal-100", text: "text-teal-800", border: "border-teal-300", dot: "bg-teal-500" },
    };

    const DAY_NAMES = ["일", "월", "화", "수", "목", "금", "토"];
    const START_DATE = new Date(2026, 2, 4); // 2026년 3월 4일
    const FIXED_YEAR = 2026;

    const App = () => {
      const [month, setMonth] = useState(2); // 3월 시작
      const [holidays, setHolidays] = useState(() => JSON.parse(localStorage.getItem('holidays') || '{}'));
      const [sessionNames, setSessionNames] = useState(() => JSON.parse(localStorage.getItem('sessionNames') || '{}'));
      const [visibleClasses, setVisibleClasses] = useState([1, 2, 3, 4, 5, 6]);
      const [activeTab, setActiveTab] = useState("calendar");
      const [editingSession, setEditingSession] = useState(null);
      const [sessionInput, setSessionInput] = useState("");

      const classes = [
        { id: 1, name: "1반", days: [1, 3] }, // 임시 요일 (설정에서 변경 가능)
        { id: 2, name: "2반", days: [2, 4] },
        { id: 3, name: "3반", days: [1, 2, 5] },
        { id: 4, name: "4반", days: [2, 3, 5] },
        { id: 5, name: "5반", days: [1, 4, 5] },
        { id: 6, name: "6반", days: [3, 4] },
      ];

      // 로컬 스토리지 저장
      useEffect(() => {
        localStorage.setItem('holidays', JSON.stringify(holidays));
        localStorage.setItem('sessionNames', JSON.stringify(sessionNames));
      }, [holidays, sessionNames]);

      const calDays = useMemo(() => {
        const first = new Date(FIXED_YEAR, month, 1);
        const last = new Date(FIXED_YEAR, month + 1, 0);
        const days = [];
        for (let i = 0; i < first.getDay(); i++) days.push(null);
        for (let d = 1; d <= last.getDate(); d++) days.push(d);
        return days;
      }, [month]);

      // 특정 날짜까지의 유효 수업 횟수 계산 (3월 4일 이후부터)
      const getSessionInfo = (cls, targetDay, targetMonth) => {
        let sessionCount = 0;
        let isCancelled = false;
        let isBeforeStart = false;

        // 3월부터 해당 월까지 루프
        for (let m = 2; m <= targetMonth; m++) {
          const lastDay = new Date(FIXED_YEAR, m + 1, 0).getDate();
          for (let d = 1; d <= lastDay; d++) {
            const currentDate = new Date(FIXED_YEAR, m, d);
            const key = `${FIXED_YEAR}-${m}-${d}`;

            // 시작일(3월 4일) 이전이면 패스
            if (currentDate < START_DATE) {
              if (m === targetMonth && d === targetDay) isBeforeStart = true;
              continue;
            }

            if (cls.days.includes(currentDate.getDay())) {
              if (holidays[key]) {
                if (m === targetMonth && d === targetDay) isCancelled = true;
              } else {
                sessionCount++;
                if (m === targetMonth && d === targetDay) return { num: sessionCount, isCancelled: false, isBeforeStart: false };
              }
            }
          }
        }
        return { num: sessionCount, isCancelled, isBeforeStart };
      };

      const toggleHoliday = (day) => {
        const key = `${FIXED_YEAR}-${month}-${day}`;
        setHolidays(prev => ({ ...prev, [key]: !prev[key] }));
      };

      return (
        <div className="min-h-screen pb-10">
          <header className="bg-white border-b p-4 flex justify-between items-center shadow-sm sticky top-0 z-10">
            <h1 className="text-xl font-bold text-gray-800">🗓️ 2026 수업 관리 ({month + 1}월)</h1>
            <div className="flex bg-gray-100 p-1 rounded-lg">
              {['calendar', 'stats'].map(t => (
                <button key={t} onClick={() => setActiveTab(t)} 
                  className={`px-4 py-1.5 rounded-md text-sm font-medium transition-all ${activeTab === t ? "bg-white shadow text-blue-600" : "text-gray-500"}`}>
                  {t === 'calendar' ? '달력' : '통계'}
                </button>
              ))}
            </div>
          </header>

          <main className="max-w-5xl mx-auto p-4">
            <div className="flex justify-between items-center mb-6">
              <div className="flex gap-2 items-center">
                <button onClick={() => setMonth(m => Math.max(2, m - 1))} className="p-2 hover:bg-gray-200 rounded">◀</button>
                <span className="text-lg font-bold w-20 text-center">{month + 1}월</span>
                <button onClick={() => setMonth(m => Math.min(11, m + 1))} className="p-2 hover:bg-gray-200 rounded">▶</button>
              </div>
              <div className="flex flex-wrap gap-2 justify-end">
                {classes.map(cls => (
                  <button key={cls.id} onClick={() => setVisibleClasses(prev => prev.includes(cls.id) ? prev.filter(id => id !== cls.id) : [...prev, cls.id])}
                    className={`px-3 py-1 rounded-full text-xs font-bold border transition-all ${visibleClasses.includes(cls.id) ? `${CLASS_THEMES[cls.id].bg} ${CLASS_THEMES[cls.id].text} ${CLASS_THEMES[cls.id].border}` : "bg-white text-gray-300 border-gray-100"}`}>
                    {cls.name}
                  </button>
                ))}
              </div>
            </div>

            {activeTab === 'calendar' ? (
              <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div className="calendar-grid border-b bg-gray-50">
                  {DAY_NAMES.map((d, i) => (
                    <div key={d} className={`py-3 text-center text-xs font-bold ${i === 0 ? "text-red-500" : i === 6 ? "text-blue-500" : "text-gray-400"}`}>{d}</div>
                  ))}
                </div>
                <div className="calendar-grid">
                  {calDays.map((day, i) => {
                    const isSun = i % 7 === 0;
                    const isSat = i % 7 === 6;
                    const holidayKey = `${FIXED_YEAR}-${month}-${day}`;
                    const isHoliday = holidays[holidayKey];

                    return (
                      <div key={i} className={`min-h-32 border-r border-b p-2 transition-colors ${!day ? "bg-gray-50" : isHoliday ? "bg-red-50" : "bg-white"}`}>
                        {day && (
                          <>
                            <div className="flex justify-between items-start mb-2">
                              <span onClick={() => toggleHoliday(day)} className={`text-sm font-bold cursor-pointer w-7 h-7 flex items-center justify-center rounded-full hover:bg-yellow-100 ${isSun ? "text-red-500" : isSat ? "text-blue-500" : "text-gray-700"}`}>
                                {day}
                              </span>
                              {isHoliday && <span className="text-[10px] bg-red-200 text-red-700 px-1 rounded">휴업</span>}
                            </div>
                            <div className="space-y-1">
                              {classes.filter(c => visibleClasses.includes(c.id)).map(cls => {
                                const info = getSessionInfo(cls, day, month);
                                const dateObj = new Date(FIXED_YEAR, month, day);
                                if (!cls.days.includes(dateObj.getDay()) || info.isBeforeStart) return null;

                                const theme = CLASS_THEMES[cls.id];
                                const sessionName = sessionNames[`${cls.id}-${info.num}`] || `${info.num}차시`;

                                return (
                                  <div key={cls.id} 
                                    onClick={() => !info.isCancelled && (setEditingSession({clsId: cls.id, num: info.num}), setSessionInput(sessionNames[`${cls.id}-${info.num}`] || ""))}
                                    className={`text-[11px] p-1 rounded border cursor-pointer truncate ${info.isCancelled ? "line-through" : `${theme.bg} ${theme.text} ${theme.border} font-bold shadow-sm`}`}>
                                    {cls.name}: {info.isCancelled ? "휴강" : sessionName}
                                  </div>
                                );
                              })}
                            </div>
                          </>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            ) : (
              <div className="bg-white rounded-2xl p-6 shadow-sm border">
                <h3 className="text-lg font-bold mb-4">반별 진도 요약 ({month + 1}월)</h3>
                <div className="space-y-4">
                  {classes.map(cls => {
                    const monthSessions = calDays.filter(d => d && !holidays[`${FIXED_YEAR}-${month}-${d}`] && 
                      cls.days.includes(new Date(FIXED_YEAR, month, d).getDay()) && 
                      new Date(FIXED_YEAR, month, d) >= START_DATE).length;
                    return (
                      <div key={cls.id} className="flex items-center justify-between p-3 border-b">
                        <span className={`px-3 py-1 rounded-full text-sm font-bold ${CLASS_THEMES[cls.id].bg} ${CLASS_THEMES[cls.id].text}`}>
                          {cls.name}
                        </span>
                        <div className="text-right">
                          <span className="text-xl font-bold text-gray-800">{monthSessions}회</span>
                          <p className="text-xs text-gray-400">이번 달 수업 예정</p>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </main>

          {editingSession && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
                <h2 className="text-lg font-bold mb-2">{editingSession.clsId}반 {editingSession.num}차시 진도</h2>
                <input autoFocus className="w-full border-2 border-blue-100 rounded-xl p-3 mb-4 focus:border-blue-500 outline-none" 
                  placeholder="단원명이나 학습 내용을 입력하세요"
                  value={sessionInput} onChange={e => setSessionInput(e.target.value)} />
                <div className="flex gap-2">
                  <button className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold" 
                    onClick={() => { setSessionNames(prev => ({...prev, [`${editingSession.clsId}-${editingSession.num}`]: sessionInput})); setEditingSession(null); }}>저장</button>
                  <button className="flex-1 bg-gray-100 text-gray-600 py-3 rounded-xl font-bold" onClick={() => setEditingSession(null)}>취소</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
