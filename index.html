<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 학급 수업 관리 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
  <style>
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
    .line-through { text-decoration: line-through; opacity: 0.5; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // 선생님이 요청하신 반별 고유 색상 테마 (확실한 구분)
    const CLASS_THEMES = {
      1: { name: "B반", bg: "bg-blue-100", text: "text-blue-800", border: "border-blue-300", dot: "bg-blue-500" },
      2: { name: "D반", bg: "bg-emerald-100", text: "text-emerald-800", border: "border-emerald-300", dot: "bg-emerald-500" },
      3: { name: "7반", bg: "bg-violet-100", text: "text-violet-800", border: "border-violet-300", dot: "bg-violet-500" },
      4: { name: "8반", bg: "bg-orange-100", text: "text-orange-800", border: "border-orange-300", dot: "bg-orange-500" },
      5: { name: "9반", bg: "bg-pink-100", text: "text-pink-800", border: "border-pink-300", dot: "bg-pink-500" },
      6: { name: "10반", bg: "bg-teal-100", text: "text-teal-800", border: "border-teal-300", dot: "bg-teal-500" },
    };

    const DAY_NAMES = ["일", "월", "화", "수", "목", "금", "토"];
    const START_DATE = new Date(2026, 2, 4); // 2026년 3월 4일 수업 시작
    const FIXED_YEAR = 2026;

    const App = () => {
      const [month, setMonth] = useState(2); // 3월 기본 설정
      const [holidays, setHolidays] = useState(() => JSON.parse(localStorage.getItem('holidays') || '{}'));
      const [sessionNames, setSessionNames] = useState(() => JSON.parse(localStorage.getItem('sessionNames') || '{}'));
      const [visibleClasses, setVisibleClasses] = useState([1, 2, 3, 4, 5, 6]);
      const [activeTab, setActiveTab] = useState("calendar");
      const [editingSession, setEditingSession] = useState(null);
      const [sessionInput, setSessionInput] = useState("");

      // 클로드가 설정했던 초기 반 정보 유지
      const classes = [
        { id: 1, name: "B반", days: [1, 3, 4] },
        { id: 2, name: "D반", days: [2, 3, 5] },
        { id: 3, name: "7반", days: [1, 2, 3] },
        { id: 4, name: "8반", days: [2, 4, 5] },
        { id: 5, name: "9반", days: [2, 3, 4] },
        { id: 6, name: "10반", days: [1, 4, 5] },
      ];

      useEffect(() => {
        localStorage.setItem('holidays', JSON.stringify(holidays));
        localStorage.setItem('sessionNames', JSON.stringify(sessionNames));
      }, [holidays, sessionNames]);

      const calDays = useMemo(() => {
        const first = new Date(FIXED_YEAR, month, 1);
        const last = new Date(FIXED_YEAR, month + 1, 0);
        const days = [];
        for (let i = 0; i < first.getDay(); i++) days.push(null);
        for (let d = 1; d <= last.getDate(); d++) days.push(d);
        return days;
      }, [month]);

      const getSessionInfo = (cls, targetDay, targetMonth) => {
        let sessionCount = 0;
        for (let m = 2; m <= targetMonth; m++) {
          const lastDay = new Date(FIXED_YEAR, m + 1, 0).getDate();
          for (let d = 1; d <= lastDay; d++) {
            const currentDate = new Date(FIXED_YEAR, m, d);
            const key = `${FIXED_YEAR}-${m}-${d}`;
            if (currentDate < START_DATE) continue;
            if (cls.days.includes(currentDate.getDay())) {
              if (!holidays[key]) {
                sessionCount++;
                if (m === targetMonth && d === targetDay) return { num: sessionCount, isCancelled: false };
              } else if (m === targetMonth && d === targetDay) {
                return { num: sessionCount + 1, isCancelled: true };
              }
            }
          }
        }
        return { num: 0, isCancelled: false };
      };

      return (
        <div className="min-h-screen pb-10">
          <header className="bg-white border-b p-4 flex justify-between items-center shadow-sm">
            <h1 className="text-xl font-bold text-gray-800">🗓️ 2026 수업 관리 대시보드</h1>
            <div className="flex bg-gray-100 p-1 rounded-lg">
              <button onClick={() => setActiveTab('calendar')} className={`px-4 py-1.5 rounded-md text-sm font-medium ${activeTab === 'calendar' ? "bg-white shadow text-blue-600" : "text-gray-500"}`}>달력</button>
              <button onClick={() => setActiveTab('stats')} className={`px-4 py-1.5 rounded-md text-sm font-medium ${activeTab === 'stats' ? "bg-white shadow text-blue-600" : "text-gray-500"}`}>통계</button>
            </div>
          </header>

          <main className="max-w-5xl mx-auto p-4">
            <div className="flex justify-between items-center mb-6">
              <div className="flex gap-2 items-center">
                <button onClick={() => setMonth(m => Math.max(0, m - 1))} className="p-2 hover:bg-gray-200 rounded">◀</button>
                <span className="text-lg font-bold w-24 text-center">{FIXED_YEAR}년 {month + 1}월</span>
                <button onClick={() => setMonth(m => Math.min(11, m + 1))} className="p-2 hover:bg-gray-200 rounded">▶</button>
              </div>
              <div className="flex flex-wrap gap-2 justify-end">
                {classes.map(cls => (
                  <button key={cls.id} onClick={() => setVisibleClasses(prev => prev.includes(cls.id) ? prev.filter(id => id !== cls.id) : [...prev, cls.id])}
                    className={`px-3 py-1 rounded-full text-xs font-bold border transition-all ${visibleClasses.includes(cls.id) ? `${CLASS_THEMES[cls.id].bg} ${CLASS_THEMES[cls.id].text} ${CLASS_THEMES[cls.id].border}` : "bg-white text-gray-300 border-gray-100"}`}>
                    {cls.name}
                  </button>
                ))}
              </div>
            </div>

            {activeTab === 'calendar' ? (
              <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div className="calendar-grid border-b bg-gray-50">
                  {DAY_NAMES.map((d, i) => (
                    <div key={d} className={`py-3 text-center text-xs font-bold ${i === 0 ? "text-red-500" : i === 6 ? "text-blue-500" : "text-gray-400"}`}>{d}</div>
                  ))}
                </div>
                <div className="calendar-grid">
                  {calDays.map((day, i) => {
                    const dateObj = day ? new Date(FIXED_YEAR, month, day) : null;
                    const isHoliday = day && holidays[`${FIXED_YEAR}-${month}-${day}`];

                    return (
                      <div key={i} className={`min-h-32 border-r border-b p-1.5 ${!day ? "bg-gray-50" : isHoliday ? "bg-red-50" : "bg-white"}`}>
                        {day && (
                          <>
                            <div className="flex justify-between mb-1">
                              <span onClick={() => setHolidays(prev => ({...prev, [`${FIXED_YEAR}-${month}-${day}`]: !isHoliday}))} 
                                className={`text-xs font-bold cursor-pointer w-6 h-6 flex items-center justify-center rounded-full hover:bg-yellow-100 ${i%7===0?"text-red-500":i%7===6?"text-blue-500":"text-gray-700"}`}>
                                {day}
                              </span>
                              {isHoliday && <span className="text-[10px] text-red-500 font-bold">휴업</span>}
                            </div>
                            <div className="flex flex-col gap-1">
                              {classes.filter(c => visibleClasses.includes(c.id)).map(cls => {
                                if (!dateObj || !cls.days.includes(dateObj.getDay()) || dateObj < START_DATE) return null;
                                const info = getSessionInfo(cls, day, month);
                                const theme = CLASS_THEMES[cls.id];
                                const sessionName = sessionNames[`${cls.id}-${info.num}`] || `${info.num}차시`;

                                return (
                                  <div key={cls.id} 
                                    onClick={() => !info.isCancelled && (setEditingSession({clsId: cls.id, num: info.num, name: cls.name}), setSessionInput(sessionNames[`${cls.id}-${info.num}`] || ""))}
                                    className={`text-[10px] p-1 rounded border leading-tight cursor-pointer truncate ${info.isCancelled ? "line-through bg-gray-100 text-gray-400 border-gray-200" : `${theme.bg} ${theme.text} ${theme.border} font-bold shadow-sm`}`}>
                                    {cls.name} {!info.isCancelled && sessionName}
                                  </div>
                                );
                              })}
                            </div>
                          </>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            ) : (
              <div className="bg-white rounded-2xl p-6 shadow-sm border">
                <h3 className="text-lg font-bold mb-4">반별 진도 및 수업 횟수 요약</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {classes.map(cls => {
                    const actualSessions = calDays.filter(d => {
                      if(!d) return false;
                      const date = new Date(FIXED_YEAR, month, d);
                      return date >= START_DATE && cls.days.includes(date.getDay()) && !holidays[`${FIXED_YEAR}-${month}-${d}`];
                    }).length;
                    const theme = CLASS_THEMES[cls.id];
                    return (
                      <div key={cls.id} className={`p-4 rounded-xl border-2 ${theme.border} ${theme.bg}`}>
                        <div className="flex justify-between items-center">
                          <span className={`text-lg font-black ${theme.text}`}>{cls.name}</span>
                          <span className="text-2xl font-bold text-gray-800">{actualSessions}회</span>
                        </div>
                        <p className="text-xs mt-1 text-gray-600 opacity-80">{month+1}월 실제 수업 예정 횟수</p>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </main>

          {editingSession && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
                <h2 className="text-lg font-bold mb-2">{editingSession.name} {editingSession.num}차시 진도 입력</h2>
                <input autoFocus className="w-full border-2 border-blue-100 rounded-xl p-3 mb-4 focus:border-blue-500 outline-none" 
                  value={sessionInput} onChange={e => setSessionInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && document.getElementById('save-btn').click()} />
                <div className="flex gap-2">
                  <button id="save-btn" className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold" 
                    onClick={() => { setSessionNames(prev => ({...prev, [`${editingSession.clsId}-${editingSession.num}`]: sessionInput})); setEditingSession(null); }}>저장</button>
                  <button className="flex-1 bg-gray-100 text-gray-600 py-3 rounded-xl font-bold" onClick={() => setEditingSession(null)}>취소</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
