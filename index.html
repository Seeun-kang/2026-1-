  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDzFK6I-aHAtJNc7JhchsWxfYP0L7tzLgA",
      authDomain: "school-time-table-dddb4.firebaseapp.com",
      projectId: "school-time-table-dddb4",
      storageBucket: "school-time-table-dddb4.firebasestorage.app",
      messagingSenderId: "894931280939",
      appId: "1:894931280939:web:3f770441e778dcdad5b66e"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const REF = doc(db, "dashboard", "main");

    window._fbLoad = async () => {
      try {
        const snap = await getDoc(REF);
        if(snap.exists()) return snap.data().semesters || null;
      } catch(e) { console.warn("Firebase load error:", e); }
      return null;
    };

    window._fbSave = async (semesters) => {
      try {
        await setDoc(REF, { semesters, updatedAt: new Date().toISOString() });
      } catch(e) { console.warn("Firebase save error:", e); }
    };

    window._fbReady = true;
    window.dispatchEvent(new Event("fbReady"));
  </script>

<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;

/* ═══════════════ 상수 / 헬퍼 ═══════════════ */
const DAY_NAMES      = ["일","월","화","수","목","금","토"];
const DAY_NAMES_FULL = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
const TOTAL_SESSIONS = 34;
const today = new Date();

const COLOR_OPTIONS = [
  { id:"pink",   bg:"#fce7f3", text:"#9d174d", border:"#f472b6", dot:"#ec4899", label:"분홍" },
  { id:"sky",    bg:"#e0f2fe", text:"#0369a1", border:"#38bdf8", dot:"#0ea5e9", label:"하늘" },
  { id:"blue",   bg:"#dbeafe", text:"#1e40af", border:"#60a5fa", dot:"#3b82f6", label:"파랑" },
  { id:"yellow", bg:"#fef9c3", text:"#854d0e", border:"#fbbf24", dot:"#f59e0b", label:"노랑" },
  { id:"green",  bg:"#dcfce7", text:"#166534", border:"#4ade80", dot:"#22c55e", label:"초록" },
  { id:"orange", bg:"#ffedd5", text:"#9a3412", border:"#fb923c", dot:"#f97316", label:"주황" },
  { id:"purple", bg:"#ede9fe", text:"#4c1d95", border:"#a78bfa", dot:"#8b5cf6", label:"보라" },
  { id:"red",    bg:"#fee2e2", text:"#991b1b", border:"#f87171", dot:"#ef4444", label:"빨강" },
  { id:"teal",   bg:"#ccfbf1", text:"#134e4a", border:"#2dd4bf", dot:"#14b8a6", label:"청록" },
  { id:"indigo", bg:"#e0e7ff", text:"#3730a3", border:"#818cf8", dot:"#6366f1", label:"남색" },
  { id:"lime",   bg:"#f7fee7", text:"#365314", border:"#a3e635", dot:"#84cc16", label:"연두" },
  { id:"gray",   bg:"#f3f4f6", text:"#374151", border:"#9ca3af", dot:"#6b7280", label:"회색" },
];
const getColorById = id => COLOR_OPTIONS.find(c=>c.id===id) || COLOR_OPTIONS[0];

const cs = {
  badge:   c => ({ backgroundColor:c.bg, color:c.text, border:`1px solid ${c.border}` }),
  pill:    c => ({ backgroundColor:c.bg, color:c.text, border:`1px solid ${c.border}` }),
  pillOff: () => ({ backgroundColor:"#fff", color:"#9ca3af", border:"1px solid #e5e7eb" }),
  dot:     c => ({ backgroundColor:c.dot, width:10, height:10, borderRadius:"50%", display:"inline-block" }),
  bar:    (c,p) => ({ width:`${p}%`, backgroundColor:c.dot, height:8, borderRadius:9999 }),
  dayBtn: (c,on) => on
    ? { backgroundColor:c.bg, color:c.text, border:`2px solid ${c.border}` }
    : { backgroundColor:"#f9fafb", color:"#9ca3af", border:"2px solid #e5e7eb" },
};

const makeId = () => Math.random().toString(36).slice(2,9);
const parseDate = str => { if(!str) return null; const [y,m,d]=str.split("-").map(Number); return new Date(y,m-1,d); };
const dateStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

/* 날짜가 수업기간 안에 있는지 */
const inPeriod = (y,m,d,sd,ed) => {
  const dt = new Date(y,m,d);
  if(sd && dt<sd) return false;
  if(ed && dt>ed) return false;
  return true;
};

/* 기본 반 목록 */
const defaultClasses = () => [
  { id:makeId(), name:"B반",  days:[1,3,4], colorId:"pink"   },
  { id:makeId(), name:"D반",  days:[2,3,5], colorId:"sky"    },
  { id:makeId(), name:"7반",  days:[1,2,3], colorId:"blue"   },
  { id:makeId(), name:"8반",  days:[2,4,5], colorId:"yellow" },
  { id:makeId(), name:"9반",  days:[2,3,4], colorId:"green"  },
  { id:makeId(), name:"10반", days:[1,4,5], colorId:"orange" },
];

/* 수업(과목) 생성 */
const makeSubject = (name, sem) => ({
  id: makeId(),
  name,
  totalSessions: 34,
  classes: defaultClasses(),
  holidays: {},
  sessionNames: {},
  commonNames: {},
  periodStart: sem===1 ? `${today.getFullYear()}-03-01` : `${today.getFullYear()}-09-01`,
  periodEnd:   sem===1 ? `${today.getFullYear()}-07-31` : `${today.getFullYear()}-12-31`,
});

/* 학기 생성 */
const makeSemester = (year, sem) => ({
  id: makeId(),
  year,
  sem,
  examPeriods: [],   // 학기 공유
  subjects: [ makeSubject("생명과학", sem) ],
});

/* ═══════════════ 홈 화면 ═══════════════ */
function HomeScreen({ semesters, setSemesters, onSelect, onAdd, onDelete, syncState, lastSaved }) {
  const [newYear, setNewYear] = useState(today.getFullYear());
  const [newSem,  setNewSem]  = useState(1);
  const [showAdd, setShowAdd] = useState(false);
  const exists = (y,s) => semesters.some(x=>x.year===y&&x.sem===s);

  const grouped = useMemo(()=>{
    const map={};
    semesters.forEach(s=>{ if(!map[s.year]) map[s.year]=[]; map[s.year].push(s); });
    return Object.entries(map).sort(([a],[b])=>Number(a)-Number(b));
  },[semesters]);

  const syncLabel = syncState==="saving" ? "☁️ 저장 중..." : syncState==="error" ? "⚠️ 오프라인" :
    lastSaved ? `✅ ${lastSaved.getHours()}:${String(lastSaved.getMinutes()).padStart(2,"0")} 저장됨` : "✅ 연결됨";

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex flex-col items-center justify-center px-4 py-12">
      <div className="mb-8 text-center">
        <div className="text-5xl mb-3">📚</div>
        <h1 className="text-2xl font-bold text-gray-800">학급 수업 관리 대시보드</h1>
        <p className="text-sm text-gray-500 mt-1">학년도 · 학기를 선택하세요</p>
        <span className={`text-xs mt-2 inline-block px-2 py-0.5 rounded-full ${syncState==="error"?"bg-orange-100 text-orange-600":"bg-green-100 text-green-700"}`}>
          {syncLabel}
        </span>
      </div>
      <div className="w-full max-w-lg space-y-4">
        {grouped.length===0 && (
          <div className="text-center text-gray-400 py-8 bg-white rounded-2xl shadow-sm border border-gray-100 text-sm">
            아직 등록된 학기가 없습니다.<br/>아래 버튼으로 첫 학기를 추가해보세요.
          </div>
        )}
        {grouped.map(([yr,list])=>(
          <div key={yr}>
            <div className="text-xs font-bold text-gray-400 mb-2 pl-1">{yr}년도</div>
            <div className="flex gap-3">
              {[1,2].map(s=>{
                const sem=list.find(x=>x.sem===s);
                if(!sem) return (
                  <div key={s} className="flex-1 h-20 rounded-2xl border-2 border-dashed border-gray-200 flex items-center justify-center text-gray-300 text-sm">
                    {s}학기 없음
                  </div>
                );
                return (
                  <div key={s} className="flex-1 relative group">
                    <button onClick={()=>onSelect(sem.id)}
                      className="w-full h-20 rounded-2xl bg-white shadow-sm border border-gray-100 hover:shadow-md hover:border-blue-300 transition-all flex flex-col items-center justify-center gap-1">
                      <span className="text-lg font-bold text-gray-800">{yr}년 {s}학기</span>
                      <span className="text-xs text-gray-400">{sem.subjects.length}개 수업</span>
                    </button>
                    <button onClick={()=>{ if(confirm(`${yr}년 ${s}학기를 삭제할까요?`)) onDelete(sem.id); }}
                      className="absolute top-2 right-2 w-5 h-5 rounded-full bg-gray-100 text-gray-400 text-xs font-bold opacity-0 group-hover:opacity-100 hover:bg-red-100 hover:text-red-500 transition-all flex items-center justify-center">✕</button>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
        {showAdd ? (
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-3">
            <p className="text-sm font-bold text-gray-700">새 학기 추가</p>
            <div className="flex gap-3 items-end flex-wrap">
              <div className="flex flex-col gap-1">
                <label className="text-xs text-gray-500">학년도</label>
                <input type="number" value={newYear} onChange={e=>setNewYear(Number(e.target.value))} min="2020" max="2040"
                  className="border border-gray-200 rounded-lg px-3 py-2 text-sm w-24 focus:outline-none focus:ring-2 focus:ring-blue-300"/>
              </div>
              <div className="flex flex-col gap-1">
                <label className="text-xs text-gray-500">학기</label>
                <div className="flex gap-2">
                  {[1,2].map(s=>(
                    <button key={s} onClick={()=>setNewSem(s)}
                      className={`px-4 py-2 rounded-lg text-sm font-semibold border-2 transition-all
                        ${newSem===s?"bg-blue-600 text-white border-blue-600":"bg-white text-gray-500 border-gray-200 hover:border-blue-300"}`}>
                      {s}학기
                    </button>
                  ))}
                </div>
              </div>
            </div>
            {exists(newYear,newSem)&&<p className="text-xs text-red-500">이미 존재하는 학기입니다.</p>}
            <div className="flex gap-2">
              <button onClick={()=>{ if(!exists(newYear,newSem)){onAdd(newYear,newSem);setShowAdd(false); } }} disabled={exists(newYear,newSem)}
                className="flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-blue-700 disabled:opacity-40">추가</button>
              <button onClick={()=>setShowAdd(false)}
                className="flex-1 bg-gray-100 text-gray-600 rounded-lg py-2 text-sm font-semibold hover:bg-gray-200">취소</button>
            </div>
          </div>
        ) : (
          <button onClick={()=>setShowAdd(true)}
            className="w-full py-3 rounded-2xl border-2 border-dashed border-blue-300 text-blue-500 font-semibold text-sm hover:bg-blue-50 transition-colors">
            + 새 학기 추가
          </button>
        )}

        {/* 데이터 관리 */}
        <div className="mt-4 pt-4 border-t border-blue-200 flex items-center justify-between flex-wrap gap-2">
          <span className="text-xs text-gray-400">💡 데이터는 이 브라우저에 자동 저장됩니다</span>
          <div className="flex gap-2">
            <button onClick={()=>{
              const blob = new Blob([JSON.stringify(semesters,null,2)],{type:"application/json"});
              const a = document.createElement("a");
              a.href = URL.createObjectURL(blob);
              a.download = `수업관리_백업_${new Date().toISOString().slice(0,10)}.json`;
              a.click();
            }} className="text-xs px-3 py-1.5 bg-white border border-gray-200 text-gray-500 rounded-lg hover:bg-gray-50 font-medium">
              💾 백업
            </button>
            <label className="text-xs px-3 py-1.5 bg-white border border-gray-200 text-gray-500 rounded-lg hover:bg-gray-50 font-medium cursor-pointer">
              📂 복원
              <input type="file" accept=".json" className="hidden" onChange={e=>{
                const file=e.target.files[0]; if(!file) return;
                const reader=new FileReader();
                reader.onload=ev=>{
                  try {
                    const data=JSON.parse(ev.target.result);
                    if(Array.isArray(data)){ setSemesters(data); alert("복원 완료!"); }
                    else alert("올바른 백업 파일이 아닙니다.");
                  } catch { alert("파일을 읽을 수 없습니다."); }
                };
                reader.readAsText(file);
                e.target.value="";
              }}/>
            </label>
            <button onClick={()=>{
              if(confirm("모든 데이터를 초기화할까요? 되돌릴 수 없습니다."))
                setSemesters([makeSemester(2026,1)]);
            }} className="text-xs px-3 py-1.5 bg-white border border-red-200 text-red-400 rounded-lg hover:bg-red-50 font-medium">
              🗑️ 초기화
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════ 수업 선택 화면 (학기 내) ═══════════════ */
function SemesterScreen({ semData, onSelectSubject, onAddSubject, onDeleteSubject, onBack, onUpdateExam }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState("");

  const handleAdd = () => {
    if(!newName.trim()) return;
    onAddSubject(newName.trim());
    setNewName(""); setShowAdd(false);
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-purple-50 flex flex-col items-center justify-center px-4 py-12">
      <div className="mb-6 text-center">
        <button onClick={onBack} className="text-gray-400 hover:text-gray-600 text-sm mb-3 block mx-auto">← 학기 목록으로</button>
        <div className="text-4xl mb-2">🗂️</div>
        <h1 className="text-xl font-bold text-gray-800">{semData.year}년 {semData.sem}학기</h1>
        <p className="text-sm text-gray-500 mt-1">수업을 선택하세요</p>
      </div>
      <div className="w-full max-w-md space-y-3">
        {semData.subjects.map(subj=>(
          <div key={subj.id} className="relative group">
            <button onClick={()=>onSelectSubject(subj.id)}
              className="w-full py-5 px-6 rounded-2xl bg-white shadow-sm border border-gray-100 hover:shadow-md hover:border-indigo-300 transition-all flex items-center justify-between">
              <div className="flex items-center gap-3">
                <span className="text-2xl">📖</span>
                <div className="text-left">
                  <div className="font-bold text-gray-800">{subj.name}</div>
                  <div className="text-xs text-gray-400 mt-0.5">{subj.classes.length}개 반 · 총 {subj.totalSessions}차시</div>
                </div>
              </div>
              <span className="text-gray-300 text-lg">›</span>
            </button>
            <button onClick={()=>{ if(confirm(`'${subj.name}' 수업을 삭제할까요?`)) onDeleteSubject(subj.id); }}
              className="absolute top-3 right-10 w-5 h-5 rounded-full bg-gray-100 text-gray-400 text-xs opacity-0 group-hover:opacity-100 hover:bg-red-100 hover:text-red-500 transition-all flex items-center justify-center">✕</button>
          </div>
        ))}
        {showAdd ? (
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-3">
            <p className="text-sm font-bold text-gray-700">새 수업 추가</p>
            <input autoFocus value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleAdd()}
              placeholder="예: 생명과학, 지구과학, 화학1"
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
            <div className="flex gap-2">
              <button onClick={handleAdd} disabled={!newName.trim()}
                className="flex-1 bg-indigo-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-indigo-700 disabled:opacity-40">추가</button>
              <button onClick={()=>{ setShowAdd(false); setNewName(""); }}
                className="flex-1 bg-gray-100 text-gray-600 rounded-lg py-2 text-sm font-semibold hover:bg-gray-200">취소</button>
            </div>
          </div>
        ) : (
          <button onClick={()=>setShowAdd(true)}
            className="w-full py-3 rounded-2xl border-2 border-dashed border-indigo-300 text-indigo-400 font-semibold text-sm hover:bg-indigo-50 transition-colors">
            + 새 수업 추가
          </button>
        )}

        {/* 학기 공유 시험기간 미리보기 */}
        {semData.examPeriods.length>0 && (
          <div className="bg-purple-50 border border-purple-200 rounded-2xl p-4 mt-2">
            <p className="text-xs font-bold text-purple-700 mb-2">✏️ 학기 시험기간 (모든 수업 공유)</p>
            {semData.examPeriods.map(ep=>(
              <div key={ep.id} className="text-xs text-purple-600">{ep.label}: {ep.start} ~ {ep.end}</div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════ 수업 대시보드 ═══════════════ */
function Dashboard({ semData, subjData, onUpdateSubject, onUpdateSemExam, onBack, syncState, lastSaved }) {
  const [year,  setYear]  = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());

  const [classes,      setClasses]      = useState(subjData.classes);
  const [holidays,     setHolidays]     = useState(subjData.holidays);
  const [sessionNames, setSessionNames] = useState(subjData.sessionNames);
  const [commonNames,  setCommonNames]  = useState(subjData.commonNames);
  const [periodStart,  setPeriodStart]  = useState(subjData.periodStart);
  const [periodEnd,    setPeriodEnd]    = useState(subjData.periodEnd);
  const [totalSess,    setTotalSess]    = useState(subjData.totalSessions);

  const [examPeriods,  setExamPeriods]  = useState(semData.examPeriods);
  const [examForm,     setExamForm]     = useState({ label:"", start:"", end:"" });

  const [visibleClasses, setVisibleClasses] = useState(subjData.classes.map(c=>c.id));
  const [activeTab,      setActiveTab]      = useState("calendar");
  const [editingCommonNum, setEditingCommonNum] = useState(null);
  const [commonEditInput,  setCommonEditInput]  = useState("");
  const [editingSession, setEditingSession] = useState(null);
  const [sessionInput,   setSessionInput]   = useState("");
  const [commonInput,    setCommonInput]    = useState("");
  const [showClassMgr,   setShowClassMgr]   = useState(false);
  const [classForm,      setClassForm]      = useState({name:"",colorId:"pink",days:[]});
  const [editTargetId,   setEditTargetId]   = useState(null);
  const [subjNameEdit,   setSubjNameEdit]   = useState(false);
  const [subjNameInput,  setSubjNameInput]  = useState(subjData.name);

  const startDate = useMemo(()=>parseDate(periodStart),[periodStart]);
  const endDate   = useMemo(()=>parseDate(periodEnd),  [periodEnd]);

  /* 수업 데이터 저장 */
  useEffect(()=>{
    onUpdateSubject({ classes, holidays, sessionNames, commonNames, periodStart, periodEnd, totalSessions:totalSess, name:subjNameInput });
  },[classes,holidays,sessionNames,commonNames,periodStart,periodEnd,totalSess,subjNameInput]);

  /* 시험기간 저장 (학기 공유) */
  useEffect(()=>{ onUpdateSemExam(examPeriods); },[examPeriods]);

  /* ─ 수업기간 내 달력 생성 (방학 제외) ─
     periodStart~periodEnd 사이의 날짜만 포함, 주 단위로 그룹핑 */
  const calWeeks = useMemo(()=>{
    if(!startDate||!endDate) return null; // null이면 일반 월별 달력 사용
    // 현재 보이는 달이 수업기간과 겹치는지 확인
    const monthStart = new Date(year,month,1);
    const monthEnd   = new Date(year,month+1,0);
    if(endDate < monthStart || startDate > monthEnd) return []; // 이 달은 방학

    // 이 달에서 수업기간에 해당하는 날만 추출, 주 단위 배열로
    const weeks = [];
    let week = [];
    const firstDay = new Date(Math.max(monthStart, startDate));
    // 첫 번째 유효일의 요일만큼 앞에 null 채우기
    for(let i=0;i<firstDay.getDay();i++) week.push(null);

    let cur = new Date(firstDay);
    while(cur <= monthEnd && cur <= endDate) {
      week.push(cur.getDate());
      if(week.length===7){ weeks.push(week); week=[]; }
      cur = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate()+1);
    }
    if(week.length>0){
      while(week.length<7) week.push(null);
      weeks.push(week);
    }
    return weeks;
  },[year,month,startDate,endDate]);

  const isExamDay = useCallback((y,m,d)=>{
    const dt=new Date(y,m,d);
    return examPeriods.some(ep=>{
      const s=parseDate(ep.start), e=parseDate(ep.end);
      return s&&e&&dt>=s&&dt<=e;
    });
  },[examPeriods]);

  /* 이전 달 수업 횟수 */
  const getPastSessions = useCallback((cls)=>{
    let count=0;
    for(let m=0;m<month;m++){
      const last=new Date(year,m+1,0);
      for(let d=1;d<=last.getDate();d++){
        const date=new Date(year,m,d);
        const key=`${year}-${m}-${d}`;
        if(cls.days.includes(date.getDay())&&!holidays[key]&&inPeriod(year,m,d,startDate,endDate)&&!isExamDay(year,m,d)) count++;
      }
    }
    return count;
  },[month,year,holidays,startDate,endDate,isExamDay]);

  /* 현재 달 수업 목록 */
  const getMonthSessions = useCallback((cls)=>{
    const allDays = calWeeks ? calWeeks.flat().filter(Boolean) : (() => {
      const days=[];
      const last=new Date(year,month+1,0);
      for(let d=1;d<=last.getDate();d++) days.push(d);
      return days;
    })();

    const sessions=[];
    let num=getPastSessions(cls)+1;
    allDays.forEach(d=>{
      const date=new Date(year,month,d);
      const key=`${year}-${month}-${d}`;
      if(cls.days.includes(date.getDay())){
        const exam=isExamDay(year,month,d);
        if(exam)           sessions.push({day:d,session:null,examDay:true});
        else if(holidays[key]) sessions.push({day:d,session:num,cancelled:true});
        else               { sessions.push({day:d,session:num,cancelled:false}); num++; }
      }
    });
    return sessions;
  },[calWeeks,year,month,holidays,isExamDay,getPastSessions]);

  const allSessionsMap = useMemo(()=>{
    const map={};
    classes.forEach(cls=>{ map[cls.id]=getMonthSessions(cls); });
    return map;
  },[classes,holidays,examPeriods,year,month,startDate,endDate]);

  const getSessionLabel=(clsId,num)=>{
    const ind=sessionNames[`${clsId}-${num}`]; if(ind) return ind;
    const com=commonNames[num]; if(com) return com;
    return `${num}차시`;
  };

  const toggleHoliday=(day)=>{ const key=`${year}-${month}-${day}`; setHolidays(h=>({...h,[key]:!h[key]})); };
  const toggleDay=(clsId,dow)=>{
    setClasses(prev=>prev.map(c=>{
      if(c.id!==clsId) return c;
      const days=c.days.includes(dow)?c.days.filter(x=>x!==dow):[...c.days,dow].sort();
      return {...c,days};
    }));
  };
  const toggleVisible=(id)=>setVisibleClasses(v=>v.includes(id)?v.filter(x=>x!==id):[...v,id]);
  const prevMonth=()=>{ if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth=()=>{ if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

  const isToday   = d=>d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
  const isHoliday = d=>holidays[`${year}-${month}-${d}`];
  const isExamInView = d=>d&&isExamDay(year,month,d);
  const getExamLabel = d=>{
    const dt=new Date(year,month,d);
    const ep=examPeriods.find(ep=>{const s=parseDate(ep.start),e=parseDate(ep.end);return s&&e&&dt>=s&&dt<=e;});
    return ep?ep.label:"시험";
  };
  const getDayClasses = day=>{
    if(!day) return [];
    const dow=new Date(year,month,day).getDay();
    return classes.filter(cls=>cls.days.includes(dow)&&visibleClasses.includes(cls.id));
  };
  const openModal=(clsId,num)=>{
    setEditingSession({clsId,sessionNum:num});
    setSessionInput(sessionNames[`${clsId}-${num}`]||"");
    setCommonInput(commonNames[num]||"");
  };
  const saveModal=()=>{
    if(!editingSession) return;
    const{clsId,sessionNum}=editingSession;
    setSessionNames(s=>({...s,[`${clsId}-${sessionNum}`]:sessionInput.trim()}));
    setCommonNames(s=>({...s,[sessionNum]:commonInput.trim()}));
    setEditingSession(null);
  };
  const addExamPeriod=()=>{
    if(!examForm.start||!examForm.end||examForm.start>examForm.end) return;
    setExamPeriods(prev=>[...prev,{id:makeId(),label:examForm.label||"시험기간",start:examForm.start,end:examForm.end}]);
    setExamForm({label:"",start:"",end:""});
  };
  const openNewClass=()=>{ setClassForm({name:"",colorId:"pink",days:[]}); setEditTargetId(null); setShowClassMgr(true); };
  const openEditClass=cls=>{ setClassForm({name:cls.name,colorId:cls.colorId,days:[...cls.days]}); setEditTargetId(cls.id); setShowClassMgr(true); };
  const saveClass=()=>{
    if(!classForm.name.trim()) return;
    if(editTargetId){
      setClasses(prev=>prev.map(c=>c.id===editTargetId?{...c,...classForm,name:classForm.name.trim()}:c));
    } else {
      const nc={id:makeId(),name:classForm.name.trim(),colorId:classForm.colorId,days:classForm.days};
      setClasses(prev=>[...prev,nc]);
      setVisibleClasses(v=>[...v,nc.id]);
    }
    setShowClassMgr(false);
  };
  const deleteClass=id=>{ if(!confirm("이 반을 삭제할까요?")) return; setClasses(prev=>prev.filter(c=>c.id!==id)); setVisibleClasses(v=>v.filter(x=>x!==id)); };
  const allSessionNums=useMemo(()=>{const n=new Set();for(let i=1;i<=totalSess;i++) n.add(i);return[...n];},[totalSess]);

  /* 달력 렌더 (방학 제외) */
  const renderCalendar = () => {
    if(calWeeks===null){
      // 수업기간 미설정시 일반 월별
      const days=[];
      const first=new Date(year,month,1);
      for(let i=0;i<first.getDay();i++) days.push(null);
      const last=new Date(year,month+1,0);
      for(let d=1;d<=last.getDate();d++) days.push(d);
      return renderGrid(days);
    }
    if(calWeeks.length===0){
      return(
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 flex items-center justify-center h-32 text-gray-400 text-sm">
          이 달은 수업 기간에 포함되지 않습니다 (방학)
        </div>
      );
    }
    // 주 단위로 렌더
    const days = calWeeks.flat();
    return renderGrid(days);
  };

  const renderGrid = (days) => (
    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div className="grid grid-cols-7 border-b border-gray-100">
        {DAY_NAMES.map((d,i)=>(
          <div key={d} className={`py-2 text-center text-xs font-semibold ${i===0?"text-red-400":i===6?"text-blue-400":"text-gray-500"}`}>{d}</div>
        ))}
      </div>
      <div className="grid grid-cols-7">
        {days.map((day,idx)=>{
          const dow=idx%7;
          const dayClses=day?getDayClasses(day):[];
          const holiday=day&&isHoliday(day);
          const todayMk=day&&isToday(day);
          const examDay=isExamInView(day);
          const examLbl=examDay?getExamLabel(day):"";
          return(
            <div key={idx}
              style={examDay?{backgroundColor:"#f5f3ff"}:holiday?{backgroundColor:"#fef2f2"}:{}}
              className={`min-h-20 border-r border-b border-gray-50 p-1.5 ${!day?"bg-gray-50":""}`}>
              {day&&(
                <>
                  <div className="flex items-center justify-between mb-1">
                    <span onClick={()=>!examDay&&toggleHoliday(day)}
                      className={`text-xs font-semibold w-6 h-6 flex items-center justify-center rounded-full select-none
                        ${examDay?"text-gray-400 cursor-default":"cursor-pointer hover:ring-2 hover:ring-yellow-300"}
                        ${todayMk?"bg-blue-600 text-white":holiday?"text-red-500":dow===0?"text-red-400":dow===6?"text-blue-400":"text-gray-700"}`}>
                      {day}
                    </span>
                    {holiday&&<span className="text-xs text-red-400 font-medium">휴</span>}
                    {examDay&&!holiday&&(
                      <span style={{backgroundColor:"#7c3aed",color:"#fff",fontSize:"10px",padding:"1px 5px",borderRadius:"9999px",fontWeight:700,whiteSpace:"nowrap"}}>✏️{examLbl}</span>
                    )}
                  </div>
                  {!examDay&&(
                    <div className="flex flex-col gap-0.5">
                      {dayClses.map(cls=>{
                        const col=getColorById(cls.colorId);
                        const sess=(allSessionsMap[cls.id]||[]).find(s=>s.day===day);
                        if(!sess) return null;
                        const label=getSessionLabel(cls.id,sess.session);
                        return(
                          <div key={cls.id}
                            onClick={()=>!sess.cancelled&&openModal(cls.id,sess.session)}
                            style={{...cs.badge(col),opacity:sess.cancelled?0.4:1}}
                            className={`text-xs px-1 py-0.5 rounded font-medium truncate cursor-pointer ${sess.cancelled?"line-through":""}`}
                            title={sess.cancelled?"휴강":label}>
                            <span className="font-bold">{cls.name}</span> {!sess.cancelled&&label}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );

  const semLabel=`${semData.year}년 ${semData.sem}학기`;
  const syncLabel = syncState==="saving" ? "☁️ 저장 중..." : syncState==="error" ? "⚠️ 오프라인" :
    lastSaved ? `✅ ${lastSaved.getHours()}:${String(lastSaved.getMinutes()).padStart(2,"0")} 저장됨` : "✅ 연결됨";

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <div className="bg-white border-b border-gray-200 px-4 py-3 shadow-sm">
        <div className="flex items-center justify-between flex-wrap gap-2">
          <div className="flex items-center gap-2 flex-wrap">
            <button onClick={onBack} className="text-gray-400 hover:text-gray-600 text-lg">←</button>
            <span className="text-gray-400 text-sm">{semLabel}</span>
            <span className="text-gray-300">/</span>
            {subjNameEdit ? (
              <input autoFocus value={subjNameInput} onChange={e=>setSubjNameInput(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter"||e.key==="Escape") setSubjNameEdit(false); }}
                onBlur={()=>setSubjNameEdit(false)}
                className="text-lg font-bold text-gray-800 border-b-2 border-blue-400 focus:outline-none bg-transparent w-32"/>
            ) : (
              <button onClick={()=>setSubjNameEdit(true)} className="text-lg font-bold text-gray-800 hover:text-blue-600 transition-colors" title="클릭하여 수업명 수정">
                {subjNameInput}
              </button>
            )}
            <span className={`text-xs px-2 py-0.5 rounded-full ${syncState==="error"?"bg-orange-100 text-orange-600":syncState==="saving"?"bg-blue-100 text-blue-600":"bg-green-100 text-green-700"}`}>
              {syncLabel}
            </span>
          </div>
          <div className="flex gap-1 flex-wrap">
            {["calendar","stats","curriculum","settings"].map(tab=>(
              <button key={tab} onClick={()=>setActiveTab(tab)}
                className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors
                  ${activeTab===tab?"bg-blue-600 text-white":"text-gray-600 hover:bg-gray-100"}`}>
                {tab==="calendar"?"📅 달력":tab==="stats"?"📊 통계":tab==="curriculum"?"📝 차시 관리":"⚙️ 설정"}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-3 py-4">
        {/* 반 필터 */}
        <div className="flex flex-wrap gap-2 mb-4 items-center">
          <button onClick={()=>setVisibleClasses(classes.map(c=>c.id))}
            className="px-3 py-1 rounded-full text-xs font-medium bg-gray-200 text-gray-700 hover:bg-gray-300">전체</button>
          {classes.map(cls=>{
            const col=getColorById(cls.colorId);
            const active=visibleClasses.includes(cls.id);
            return(
              <button key={cls.id} onClick={()=>toggleVisible(cls.id)}
                style={active?cs.pill(col):cs.pillOff()}
                className="px-3 py-1 rounded-full text-xs font-semibold transition-all">
                {cls.name}
              </button>
            );
          })}
          <button onClick={openNewClass}
            className="px-3 py-1 rounded-full text-xs font-semibold border-2 border-dashed border-blue-300 text-blue-400 hover:bg-blue-50">
            + 반 추가
          </button>
        </div>

        {/* ─── 달력 탭 ─── */}
        {activeTab==="calendar"&&(
          <>
            <div className="flex items-center justify-between mb-4 bg-white rounded-xl p-3 shadow-sm border border-gray-100">
              <button onClick={prevMonth} className="p-1.5 rounded-lg hover:bg-gray-100 text-gray-600">◀</button>
              <div className="text-center">
                <h2 className="font-bold text-gray-800">{year}년 {month+1}월</h2>
                {calWeeks!==null&&calWeeks.length===0&&<span className="text-xs text-orange-400">방학</span>}
              </div>
              <button onClick={nextMonth} className="p-1.5 rounded-lg hover:bg-gray-100 text-gray-600">▶</button>
            </div>
            {renderCalendar()}
            <p className="text-xs text-gray-400 mt-2 text-center">날짜 클릭 → 휴업일 | 수업 클릭 → 내용 입력</p>
          </>
        )}

        {/* ─── 통계 탭 ─── */}
        {activeTab==="stats"&&(
          <div className="space-y-4">
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <h3 className="font-bold text-gray-700 mb-3 text-sm">{year}년 {month+1}월 수업 횟수</h3>
              <div className="space-y-3">
                {classes.filter(c=>visibleClasses.includes(c.id)).map(cls=>{
                  const col=getColorById(cls.colorId);
                  const sessions=allSessionsMap[cls.id]||[];
                  const actual=sessions.filter(s=>!s.cancelled&&!s.examDay).length;
                  const cancelled=sessions.filter(s=>s.cancelled).length;
                  const past=getPastSessions(cls);
                  const cumul=past+actual;
                  const pct=Math.min((cumul/totalSess)*100,100);
                  return(
                    <div key={cls.id} className="space-y-1">
                      <div className="flex items-center justify-between">
                        <div className="flex items-center gap-2">
                          <span style={cs.dot(col)}></span>
                          <span className="text-sm font-semibold text-gray-700">{cls.name}</span>
                          <span className="text-xs text-gray-400">({cls.days.map(d=>DAY_NAMES[d]).join("/")})</span>
                        </div>
                        <div>
                          <span className="text-sm font-bold text-gray-800">{actual}회</span>
                          {cancelled>0&&<span className="text-xs text-red-400 ml-1">(휴강 {cancelled})</span>}
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="flex-1 bg-gray-100 rounded-full h-2"><div style={cs.bar(col,pct)}></div></div>
                        <span className="text-xs text-gray-500 w-16 text-right">누적 {cumul}/{totalSess}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <h3 className="font-bold text-gray-700 mb-3 text-sm">반별 비교</h3>
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-xs text-gray-500 border-b border-gray-100">
                    <th className="text-left py-2">반</th>
                    <th className="text-center py-2">수업 요일</th>
                    <th className="text-center py-2">이번달</th>
                    <th className="text-center py-2">누적</th>
                    <th className="text-center py-2">진도율</th>
                  </tr>
                </thead>
                <tbody>
                  {classes.filter(c=>visibleClasses.includes(c.id)).map(cls=>{
                    const col=getColorById(cls.colorId);
                    const sessions=allSessionsMap[cls.id]||[];
                    const actual=sessions.filter(s=>!s.cancelled&&!s.examDay).length;
                    const past=getPastSessions(cls);
                    const cumul=past+actual;
                    const pct=Math.min(Math.round((cumul/totalSess)*100),100);
                    return(
                      <tr key={cls.id} className="border-b border-gray-50">
                        <td className="py-2"><span style={cs.badge(col)} className="px-2 py-0.5 rounded text-xs font-semibold">{cls.name}</span></td>
                        <td className="text-center text-xs text-gray-600">{cls.days.map(d=>DAY_NAMES[d]).join(", ")}</td>
                        <td className="text-center font-semibold text-gray-800">{actual}회</td>
                        <td className="text-center text-gray-700">{cumul}차시</td>
                        <td className="text-center"><span style={{color:pct>=80?"#059669":pct>=50?"#d97706":"#dc2626"}} className="text-xs font-bold">{pct}%</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ─── 차시 관리 탭 ─── */}
        {activeTab==="curriculum"&&(
          <div className="space-y-3">
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <div className="flex items-center justify-between mb-1">
                <h3 className="font-bold text-gray-700 text-sm">📝 차시별 공통 수업 내용</h3>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-400">총 차시</span>
                  <input type="number" value={totalSess} onChange={e=>setTotalSess(Math.max(1,Number(e.target.value)))} min="1" max="99"
                    className="border border-gray-200 rounded-lg px-2 py-1 text-xs w-14 focus:outline-none focus:ring-2 focus:ring-blue-200 text-center"/>
                  <span className="text-xs text-gray-400">차시</span>
                </div>
              </div>
              <p className="text-xs text-gray-400 mb-4">입력한 내용은 모든 반에 표시. 달력에서 반별 개별 내용 입력 시 우선 표시.</p>
              <div className="space-y-1.5">
                {allSessionNums.map(num=>{
                  const isEdit=editingCommonNum===num;
                  const val=commonNames[num]||"";
                  return(
                    <div key={num} className="flex items-center gap-2 group">
                      <span className="text-xs font-bold text-gray-400 w-12 shrink-0 text-right">{num}차시</span>
                      {isEdit?(
                        <>
                          <input autoFocus value={commonEditInput} onChange={e=>setCommonEditInput(e.target.value)}
                            onKeyDown={e=>{
                              if(e.key==="Enter"){setCommonNames(s=>({...s,[num]:commonEditInput.trim()}));setEditingCommonNum(null);}
                              if(e.key==="Escape") setEditingCommonNum(null);
                            }}
                            placeholder="수업 내용 입력..."
                            className="flex-1 border border-blue-300 rounded-lg px-2 py-1 text-xs focus:outline-none focus:ring-2 focus:ring-blue-200"/>
                          <button onClick={()=>{setCommonNames(s=>({...s,[num]:commonEditInput.trim()}));setEditingCommonNum(null);}}
                            className="text-xs px-2 py-1 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium shrink-0">저장</button>
                          <button onClick={()=>setEditingCommonNum(null)}
                            className="text-xs px-2 py-1 bg-gray-100 text-gray-600 rounded-lg font-medium shrink-0">취소</button>
                        </>
                      ):(
                        <>
                          <span onClick={()=>{setEditingCommonNum(num);setCommonEditInput(val);}}
                            className={`flex-1 text-xs px-2 py-1.5 rounded-lg cursor-pointer border transition-colors
                              ${val?"text-gray-700 bg-gray-50 border-gray-200 hover:border-blue-300 hover:bg-blue-50"
                                  :"text-gray-300 bg-white border-dashed border-gray-200 hover:border-blue-300 hover:text-gray-400"}`}>
                            {val||"클릭하여 입력..."}
                          </span>
                          {val&&<button onClick={()=>setCommonNames(s=>{const n={...s};delete n[num];return n;})}
                            className="text-xs text-gray-300 hover:text-red-400 shrink-0 opacity-0 group-hover:opacity-100 px-1">✕</button>}
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
            {Object.keys(sessionNames).filter(k=>sessionNames[k]).length>0&&(
              <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                <h3 className="font-bold text-gray-700 mb-3 text-sm">반별 개별 수업 내용</h3>
                <div className="space-y-1.5">
                  {Object.entries(sessionNames).filter(([,v])=>v).sort(([a],[b])=>{
                    const aN=Number(a.split("-").pop()); const bN=Number(b.split("-").pop());
                    return aN-bN;
                  }).map(([key,val])=>{
                    const parts=key.split("-"); const sesNum=Number(parts.pop()); const clsId=parts.join("-");
                    const cls=classes.find(c=>c.id===clsId); if(!cls) return null;
                    const col=getColorById(cls.colorId);
                    return(
                      <div key={key} className="flex items-center gap-2 text-xs group">
                        <span className="text-gray-400 w-12 text-right shrink-0">{sesNum}차시</span>
                        <span style={cs.badge(col)} className="px-1.5 py-0.5 rounded font-bold shrink-0">{cls.name}</span>
                        <span className="text-gray-700 flex-1">{val}</span>
                        <button onClick={()=>setSessionNames(s=>{const n={...s};delete n[key];return n;})}
                          className="text-gray-300 hover:text-red-400 shrink-0 opacity-0 group-hover:opacity-100">✕</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ─── 설정 탭 ─── */}
        {activeTab==="settings"&&(
          <div className="space-y-3">

            {/* 시험기간 — 학기 공유 */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <div className="flex items-center gap-2 mb-1">
                <h3 className="font-bold text-gray-700 text-sm">✏️ 시험기간</h3>
                <span className="text-xs bg-purple-100 text-purple-600 px-2 py-0.5 rounded-full font-medium">학기 공유</span>
              </div>
              <p className="text-xs text-gray-400 mb-3">이 학기의 모든 수업에 공통 적용됩니다. 시험기간엔 수업이 없으며 차시 계산에서 제외됩니다.</p>
              <div className="flex flex-wrap gap-2 items-end mb-3">
                <div className="flex flex-col gap-1">
                  <label className="text-xs text-gray-500 font-medium">이름</label>
                  <input type="text" value={examForm.label} onChange={e=>setExamForm(f=>({...f,label:e.target.value}))}
                    placeholder="예: 1차 지필평가"
                    className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300 w-36"/>
                </div>
                <div className="flex flex-col gap-1">
                  <label className="text-xs text-gray-500 font-medium">시작일</label>
                  <input type="date" value={examForm.start} onChange={e=>setExamForm(f=>({...f,start:e.target.value}))}
                    className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300"/>
                </div>
                <div className="flex flex-col gap-1">
                  <label className="text-xs text-gray-500 font-medium">종료일</label>
                  <input type="date" value={examForm.end} onChange={e=>setExamForm(f=>({...f,end:e.target.value}))}
                    className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300"/>
                </div>
                <button onClick={addExamPeriod} style={{backgroundColor:"#7c3aed",color:"#fff"}}
                  className="px-4 py-2 rounded-lg text-sm font-semibold hover:opacity-90">+ 추가</button>
              </div>
              {examPeriods.length===0?<p className="text-xs text-gray-400">등록된 시험기간 없음</p>:(
                <div className="space-y-2">
                  {examPeriods.map(ep=>(
                    <div key={ep.id} className="flex items-center gap-2 bg-purple-50 border border-purple-200 rounded-lg px-3 py-2">
                      <span style={{backgroundColor:"#7c3aed",color:"#fff",fontSize:"10px",padding:"2px 7px",borderRadius:"9999px",fontWeight:700}}>✏️ {ep.label}</span>
                      <span className="text-xs text-purple-700 font-medium">{ep.start} ~ {ep.end}</span>
                      <button onClick={()=>setExamPeriods(prev=>prev.filter(x=>x.id!==ep.id))} className="ml-auto text-purple-300 hover:text-red-400 font-bold">✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* 수업 기간 (방학 제외) */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <h3 className="font-bold text-gray-700 mb-1 text-sm">📅 수업 기간</h3>
              <p className="text-xs text-gray-400 mb-3">수업 기간 밖의 날짜(방학)는 달력에서 표시되지 않습니다.</p>
              <div className="flex flex-wrap gap-4 items-end">
                <div className="flex flex-col gap-1">
                  <label className="text-xs text-gray-500 font-medium">시작일</label>
                  <input type="date" value={periodStart} onChange={e=>setPeriodStart(e.target.value)}
                    className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
                </div>
                <div className="flex flex-col gap-1">
                  <label className="text-xs text-gray-500 font-medium">종료일</label>
                  <input type="date" value={periodEnd} onChange={e=>setPeriodEnd(e.target.value)}
                    className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
                </div>
                <button onClick={()=>{setPeriodStart("");setPeriodEnd("");}}
                  className="px-3 py-2 text-xs bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 font-medium">기간 제한 없음</button>
              </div>
              {periodStart&&periodEnd&&periodStart>periodEnd&&<p className="text-xs text-red-500 mt-2">⚠️ 시작일이 종료일보다 늦습니다.</p>}
            </div>

            {/* 반 관리 */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <div className="flex items-center justify-between mb-3">
                <h3 className="font-bold text-gray-700 text-sm">🏫 반 관리</h3>
                <button onClick={openNewClass} className="text-xs px-3 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">+ 반 추가</button>
              </div>
              <div className="space-y-2">
                {classes.map(cls=>{
                  const col=getColorById(cls.colorId);
                  return(
                    <div key={cls.id} className="flex items-center gap-3 flex-wrap">
                      <span style={cs.badge(col)} className="px-2.5 py-1 rounded-lg text-sm font-bold w-16 text-center shrink-0">{cls.name}</span>
                      <div className="flex gap-1">
                        {[1,2,3,4,5].map(dow=>(
                          <button key={dow} onClick={()=>toggleDay(cls.id,dow)}
                            style={cs.dayBtn(col,cls.days.includes(dow))}
                            className="w-8 h-8 rounded-lg text-xs font-semibold transition-all">{DAY_NAMES[dow]}</button>
                        ))}
                      </div>
                      <div className="flex gap-1 ml-auto">
                        <button onClick={()=>openEditClass(cls)} className="text-xs px-2 py-1 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200">수정</button>
                        <button onClick={()=>deleteClass(cls.id)} className="text-xs px-2 py-1 bg-red-50 text-red-400 rounded-lg hover:bg-red-100">삭제</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 휴업일 */}
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
              <h3 className="font-bold text-gray-700 mb-2 text-sm">이번달 휴업일</h3>
              <div className="flex flex-wrap gap-2">
                {Object.entries(holidays).filter(([k,v])=>v&&k.startsWith(`${year}-${month}-`)).map(([k])=>{
                  const day=parseInt(k.split("-")[2]);
                  return(
                    <span key={k} className="flex items-center gap-1 bg-red-50 text-red-600 text-xs px-2 py-1 rounded-lg border border-red-200">
                      {month+1}월 {day}일
                      <button onClick={()=>toggleHoliday(day)} className="hover:text-red-800 ml-1">✕</button>
                    </span>
                  );
                })}
                {!Object.entries(holidays).some(([k,v])=>v&&k.startsWith(`${year}-${month}-`))&&
                  <span className="text-xs text-gray-400">지정된 휴업일 없음 (달력에서 날짜 클릭으로 지정)</span>}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* 수업 내용 모달 */}
      {editingSession&&(()=>{
        const cls=classes.find(c=>c.id===editingSession.clsId);
        const col=cls?getColorById(cls.colorId):null;
        const{sessionNum}=editingSession;
        return(
          <div className="fixed inset-0 flex items-center justify-center z-50 px-4" style={{background:"rgba(0,0,0,0.35)"}}>
            <div className="bg-white rounded-2xl shadow-xl p-5 w-full max-w-sm">
              <div className="flex items-center gap-2 mb-4">
                {col&&<span style={cs.badge(col)} className="px-2 py-0.5 rounded font-bold text-sm">{cls.name}</span>}
                <span className="font-bold text-gray-800 text-sm">{sessionNum}차시 수업 내용</span>
              </div>
              <div className="mb-3">
                <label className="text-xs font-semibold text-gray-500 mb-1 block">📌 공통 내용 <span className="font-normal text-gray-400">— 모든 반 {sessionNum}차시에 적용</span></label>
                <input value={commonInput} onChange={e=>setCommonInput(e.target.value)}
                  placeholder="예: 3단원 — 세포의 구조와 기능"
                  className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-200"/>
              </div>
              <div className="mb-4">
                <label className="text-xs font-semibold text-gray-500 mb-1 block">✏️ {cls?.name} 개별 내용 <span className="font-normal text-gray-400">— 이 반만 적용</span></label>
                <input autoFocus value={sessionInput} onChange={e=>setSessionInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&saveModal()}
                  placeholder="비워두면 공통 내용이 표시됩니다"
                  className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"/>
              </div>
              <div className="flex gap-2">
                <button onClick={saveModal} className="flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-blue-700">저장</button>
                <button onClick={()=>setEditingSession(null)} className="flex-1 bg-gray-100 text-gray-600 rounded-lg py-2 text-sm font-semibold hover:bg-gray-200">취소</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* 반 추가/수정 모달 */}
      {showClassMgr&&(
        <div className="fixed inset-0 flex items-center justify-center z-50 px-4" style={{background:"rgba(0,0,0,0.35)"}}>
          <div className="bg-white rounded-2xl shadow-xl p-5 w-full max-w-sm">
            <h3 className="font-bold text-gray-800 mb-4 text-sm">{editTargetId?"반 수정":"새 반 추가"}</h3>
            <div className="mb-3">
              <label className="text-xs font-semibold text-gray-500 mb-1 block">반 이름</label>
              <input autoFocus value={classForm.name} onChange={e=>setClassForm(f=>({...f,name:e.target.value}))}
                placeholder="예: A반, 1반, 3학년2반"
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"/>
            </div>
            <div className="mb-3">
              <label className="text-xs font-semibold text-gray-500 mb-2 block">색상</label>
              <div className="grid grid-cols-6 gap-2">
                {COLOR_OPTIONS.map(c=>(
                  <button key={c.id} onClick={()=>setClassForm(f=>({...f,colorId:c.id}))} title={c.label}
                    style={{backgroundColor:c.bg, border:`2px solid ${classForm.colorId===c.id?c.dot:"transparent"}`}}
                    className="h-8 rounded-lg transition-all flex items-center justify-center">
                    <span style={{color:c.text, fontSize:"11px", fontWeight:700}}>{c.label[0]}</span>
                  </button>
                ))}
              </div>
              <p className="text-xs text-gray-400 mt-1">선택: <span style={{color:getColorById(classForm.colorId).dot}} className="font-semibold">{getColorById(classForm.colorId).label}</span></p>
            </div>
            <div className="mb-4">
              <label className="text-xs font-semibold text-gray-500 mb-2 block">수업 요일</label>
              <div className="flex gap-2">
                {[1,2,3,4,5].map(dow=>{
                  const col=getColorById(classForm.colorId);
                  const on=classForm.days.includes(dow);
                  return(
                    <button key={dow} onClick={()=>setClassForm(f=>({...f,days:on?f.days.filter(x=>x!==dow):[...f.days,dow].sort()}))}
                      style={cs.dayBtn(col,on)} className="w-10 h-10 rounded-lg text-sm font-semibold transition-all">{DAY_NAMES[dow]}</button>
                  );
                })}
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={saveClass} disabled={!classForm.name.trim()}
                className="flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-blue-700 disabled:opacity-40">저장</button>
              <button onClick={()=>setShowClassMgr(false)}
                className="flex-1 bg-gray-100 text-gray-600 rounded-lg py-2 text-sm font-semibold hover:bg-gray-200">취소</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════ 최상위 App ═══════════════ */
const STORAGE_KEY = "class-dashboard-v4";

// debounce 헬퍼
function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(()=>fn(...args), ms); };
}
const debouncedSave = debounce((sems) => {
  if(window._fbSave) window._fbSave(sems);
}, 1500);

function App() {
  const [semesters,  setSemesters]  = useState([makeSemester(2026,1)]);
  const [activeSemId,  setActiveSemId]  = useState(null);
  const [activeSubjId, setActiveSubjId] = useState(null);
  const [syncState, setSyncState] = useState("loading"); // "loading" | "ok" | "error"
  const [lastSaved, setLastSaved] = useState(null);

  /* 앱 시작 시 Firebase에서 데이터 로드 */
  useEffect(()=>{
    const load = async () => {
      const doLoad = async () => {
        if(!window._fbLoad) return;
        const data = await window._fbLoad();
        if(data && Array.isArray(data) && data.length > 0) {
          setSemesters(data);
        }
        setSyncState("ok");
      };

      if(window._fbReady) {
        await doLoad();
      } else {
        // Firebase 모듈 로드 대기
        window.addEventListener("fbReady", async () => { await doLoad(); }, { once: true });
        // 3초 후에도 안 되면 로컬 데이터 사용
        setTimeout(()=>setSyncState(s => s==="loading" ? "error" : s), 3000);
      }
    };
    load();
  }, []);

  /* semesters 변경 시 Firebase에 저장 (debounce 1.5초) */
  useEffect(()=>{
    if(syncState !== "ok") return;
    setSyncState("saving");
    debouncedSave(semesters);
    const t = setTimeout(()=>{ setSyncState("ok"); setLastSaved(new Date()); }, 1800);
    return ()=>clearTimeout(t);
  }, [semesters]);

  const activeSem  = semesters.find(s=>s.id===activeSemId)||null;
  const activeSubj = activeSem ? activeSem.subjects.find(s=>s.id===activeSubjId)||null : null;

  const addSemester=(year,sem)=>{
    const s=makeSemester(year,sem);
    setSemesters(prev=>[...prev,s].sort((a,b)=>a.year!==b.year?a.year-b.year:a.sem-b.sem));
  };
  const deleteSemester=id=>setSemesters(prev=>prev.filter(s=>s.id!==id));

  const addSubject=(semId,name)=>{
    setSemesters(prev=>prev.map(s=>s.id!==semId?s:{...s,subjects:[...s.subjects,makeSubject(name,s.sem)]}));
  };
  const deleteSubject=(semId,subjId)=>{
    setSemesters(prev=>prev.map(s=>s.id!==semId?s:{...s,subjects:s.subjects.filter(x=>x.id!==subjId)}));
  };
  const updateSubject=(semId,subjId,data)=>{
    setSemesters(prev=>prev.map(s=>s.id!==semId?s:{...s,subjects:s.subjects.map(x=>x.id!==subjId?x:{...x,...data})}));
  };
  const updateSemExam=(semId,examPeriods)=>{
    setSemesters(prev=>prev.map(s=>s.id!==semId?s:{...s,examPeriods}));
  };

  /* 라우팅 */
  if(syncState === "loading") {
    return(
      <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex flex-col items-center justify-center gap-4">
        <div className="text-5xl animate-bounce">📚</div>
        <p className="text-gray-500 text-sm font-medium">데이터를 불러오는 중...</p>
      </div>
    );
  }

  if(activeSem && activeSubj){
    return(
      <Dashboard
        semData={activeSem}
        subjData={activeSubj}
        onUpdateSubject={data=>updateSubject(activeSemId,activeSubjId,data)}
        onUpdateSemExam={ep=>updateSemExam(activeSemId,ep)}
        onBack={()=>setActiveSubjId(null)}
        syncState={syncState}
        lastSaved={lastSaved}
      />
    );
  }
  if(activeSem){
    return(
      <SemesterScreen
        semData={activeSem}
        onSelectSubject={id=>setActiveSubjId(id)}
        onAddSubject={name=>addSubject(activeSemId,name)}
        onDeleteSubject={id=>deleteSubject(activeSemId,id)}
        onBack={()=>setActiveSemId(null)}
        onUpdateExam={ep=>updateSemExam(activeSemId,ep)}
      />
    );
  }
  return(
    <HomeScreen
      semesters={semesters}
      setSemesters={setSemesters}
      onSelect={id=>setActiveSemId(id)}
      onAdd={addSemester}
      onDelete={deleteSemester}
      syncState={syncState}
      lastSaved={lastSaved}
    />
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
